<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <!-- ترميز UTF-8 عشان يدعم العربية والايموجي بدون خربطة -->
  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- width=device-width: يخلي العرض على قد شاشة الجوال -->
  <!-- viewport-fit=cover: يملأ الشاشة كاملة حتى تحت النوتش في الايفون -->
  
  <meta name="theme-color" content="#111b21">
  <!-- لون الشريط العلوي للمتصفح على الجوال -->
  
  <title>واتساب هارون</title>

  <style>
    /* ====== 1. متغيرات الألوان العامة ====== */
    /* نستخدم متغيرات عشان نغير الثيم كامل بتغيير سطر واحد */
    :root {
      --bg-dark: #111b21;      /* خلفية الهيدر والشاشات الداكنة */
      --bg-panel: #202c33;     /* خلفية الشريط السفلي والبانلات */
      --bg-chat: #0b141a;      /* خلفية منطقة الدردشة */
      --bg-message-me: #005c4b; /* لون رسائلي */
      --bg-message-other: #202c33; /* لون رسائل الطرف الثاني */
      --text-primary: #e9edef;  /* لون النص الأساسي */
      --text-secondary: #8696a0; /* لون النص الثانوي */
      --accent-green: #25d366;  /* لون الزر والأكشن */
      --border-color: #2a3942;  /* لون الحدود الفاصلة */
    }

    /* ====== 2. إعادة الضبط العام Reset ====== */
    /* نشيل الهوامش والبادينج الافتراضي من كل العناصر */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent; 
      /* يلغي اللون الأزرق اللي يطلع عند الضغط على الجوال */
    }

    /* منع التحديد والنسخ واللصق لكل العناصر */
    /* بنسمح بالنسخ واللصق فقط لحقل الكتابة لاحقاً بالـ JS */
    body, div, span, p, h1, h2, h3, button, li {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    /* ====== 3. إعدادات الجسم الأساسي Body ====== */
    body {
      height: 100dvh; /* dvh = Dynamic Viewport Height. يحل مشكلة شريط المتصفح بالجوال */
      width: 100vw;
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      /* خط النظام عشان يكون سريع ومألوف للمستخدم */
      display: flex;
      flex-direction: column;
      overflow: hidden; /* نمنع سكرول الجسم كامل. السكرول يكون داخل العناصر فقط */
    }

    /* ====== 4. الشاشات الرئيسية ====== */
    /* كل شاشة تملأ كامل الصفحة وتختفي بالافتراضي */
    .screen {
      display: none; /* مخفي بالافتراضي */
      flex-direction: column;
      height: 100dvh;
      width: 100vw;
      position: relative;
    }

    /* الشاشة النشطة فقط هي اللي تظهر */
    .screen.active {
      display: flex;
    }

    /* ====== 5. الأزرار العامة ====== */
    button {
      background: var(--accent-green);
      color: var(--bg-dark);
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s; 
      /* تأثير خفيف عند الضغط */
    }

    button:active {
      opacity: 0.8; /* يخفت الزر لما تضغطه */
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ====== 6. الحقول العامة Input ====== */
    /* ====== 6. الحقول العامة Input ====== */
input, textarea {
  background: var(--bg-panel);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 16px; /* مهم: يمنع الزوم التلقائي في الايفون */
  outline: none;
  text-align: center;
}

    input:focus {
      border-color: var(--accent-green); /* يتلون الحد أخضر لما تضغط على الحقل */
    }

    /* ====== 7. المودال والاوفرلاي ====== */
    /* الطبقة الشفافة اللي تغطي الشاشة لما يفتح مودال */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5); /* أسود شفاف */
      z-index: 1000; /* يخليه فوق كل شيء */
    }

    .overlay.active {
      display: block; /* يظهر لما نضيف class active */
    }

    /* الصندوق المنبثق نفسه */
    .modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%); /* يخلي المودال وسط الشاشة تماماً */
      background: var(--bg-panel);
      border-radius: 12px;
      padding: 20px;
      z-index: 1001;
      min-width: 280px;
      max-width: 90%;
    }

    .modal.active {
      display: block;
    }

    /* ====== 8. التوست Toast للرسائل المؤقتة ====== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-panel);
      color: var(--text-primary);
      padding: 12px 24px;
      border-radius: 8px;
      display: none;
      z-index: 2000;
    }

    .toast.show {
      display: block;
      animation: fadeInOut 3s forwards;
    }

.send-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #25d366; /* أخضر الواتساب */
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  cursor: pointer;
  flex-shrink: 0;
  padding: 0;
}

.send-btn:active {
  background: #1ebc57;
}

.send-btn svg {
  transform: rotate(0deg); /* يميل السهم 45 درجة */
  margin-left: 0; 
  margin-right: 2px; /* يضبطه في النص */
}

    @keyframes fadeInOut {
      0% { opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; }
    }

<style>
/* ========== القسم 1.1: ستايل العناصر الداخلية لواجهات التطبيق ========== */

/* ===== 1. واجهة تسجيل الدخول ===== */
.login-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 24px;
  gap: 20px;
  max-width: 400px;

}

.logo {

}

.app-title {

  font-weight: 700;
  color: var(--text-primary);
}

.app-subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  text-align: center;
}

.login-buttons {

  gap: 12px;
  width: 100%;
}

.login-buttons button {

  gap: 12px;

  animation: fadeIn 0.3s ease;

}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

 /* direction: ltr; */ /* يثبت الترتيب من اليسار لليمين للشريط هذا فقط */

flex-wrap: nowrap; /* ممنوع يلف سطر ثاني */

flex-direction: row;

#emojiPanel {

/* ===== 4. المودالات ===== */
.menu-item {

}

.confirm-buttons button {

<script>
/* ========== القسم 3: JavaScript - المنطق والتحكم بالواجهة ========== */

/* ===== 1. متغيرات الحالة العامة ===== */

// بيانات المستخدم الحالي: uid, name, number. نقراه من localStorage

let activeScreen = 'login'; 
// يتتبع الشاشة الظاهرة الحين: login, chats, chat

// يتتبع المودال المفتوح الحين عشان نقفله لو ضغط المستخدم برا

/* ===== 2. دالة الانتقال بين الشاشات ===== */

async function generateUniqueNumber() {
  const counterRef = ref(db, 'counters/userId');
  const snapshot = await get(counterRef);
  
  let newNumber = 1000000; // يبدأ من 1000000 عشان يكون 7 خانات
  if (snapshot.exists()) {
    newNumber = snapshot.val() + 1;
  }
  
  await set(counterRef, newNumber);
  return newNumber.toString();
}

async function createAccount(name, password) {
  if (name.length < 3) {
    showToast("الاسم لازم يكون 3 حروف على الأقل");
    return;
  }
  
  if (!/^\d{5,}$/.test(password) || /(.)\1{4,}/.test(password) || password === "12345") {

    return;
  }
  
  const usersSnap = await get(ref(db, 'users'));
  if (usersSnap.exists()) {
    const users = usersSnap.val();
    const nameExists = Object.values(users).some(u => u.name === name);
    if (nameExists) {

      return;
    }
  }
  
  const number = await generateUniqueNumber();
  const userId = 'user_' + Date.now();
  
  await set(ref(db, `users/${userId}`), {
    name: name,
    number: number,
    password: password, 
    // ملاحظة: في الإنتاج استخدم bcrypt أو Firebase Auth
    createdAt: serverTimestamp()
  });
  
  currentUser = { uid: userId, name, number };

loadChatsList();
}

/* ===== 5. إرسال رسالة ===== */
let currentChatId = null;
let currentChatOtherId = null;

async function sendMessage(text) {
  if (!text.trim() || !currentChatId || !currentUser) return;
  
  const msgRef = push(ref(db, `chats/${currentChatId}/messages`));
  await set(msgRef, {
    from: currentUser.uid,
    text: text,
    time: serverTimestamp(),
    status: 'sent'
  });
  
  await update(ref(db, `userChats/${currentUser.uid}/${currentChatOtherId}`), {
    lastMsg: text,
    lastMsgTime: serverTimestamp()
  });
  
  await update(ref(db, `userChats/${currentChatOtherId}/${currentUser.uid}`), {
    lastMsg: text,
    lastMsgTime: serverTimestamp()
  });
  
  document.getElementById('messageInput').value = '';
}

/* ===== 6. سماع الرسائل لحظياً ===== */
function listenMessages(chatId, otherId) {
  // افصل الاشتراك القديم لو موجود
  if (messagesUnsubscribe) messagesUnsubscribe();

  currentChatId = chatId;
  currentChatOtherId = otherId;
  
  const messagesRef = ref(db, `chats/${chatId}/messages`);
  
  // خزن دالة الالغاء في المتغير
  messagesUnsubscribe = onValue(messagesRef, (snapshot) => {
    const messagesList = document.getElementById('messagesList');
    messagesList.innerHTML = '';
    
    if (snapshot.exists()) {
      const messages = snapshot.val();
      Object.values(messages).forEach(msg => {
        const msgDiv = document.createElement('div');
        msgDiv.className = msg.from === currentUser.uid ? 'msg-me' : 'msg-other';
        msgDiv.textContent = msg.text;
        messagesList.appendChild(msgDiv);
      });
      messagesList.scrollTop = messagesList.scrollHeight;
    }
  });
}

/* ===== 7. تحميل قائمة المحادثات ===== */
let chatsUnsubscribe = null;
let messagesUnsubscribe = null;

function loadChatsList() {
  if (!currentUser) return;

  if (chatsUnsubscribe) chatsUnsubscribe();

  const chatsRef = ref(db, `userChats/${currentUser.uid}`);
  chatsUnsubscribe = onValue(chatsRef, async (snapshot) => {
    const chatsList = document.getElementById('chatsList');
    chatsList.innerHTML = '';

    if (!snapshot.exists()) return;

    let chatsArr = [];
    const chats = snapshot.val();

    // حولها لمصفوفة عشان نقدر نرتبها
    for (const [otherId, chatData] of Object.entries(chats)) {
      const userSnap = await get(ref(db, `users/${otherId}`));
      if (userSnap.exists()) {
        chatsArr.push({
          id: otherId,
          user: userSnap.val(),
          lastMsg: chatData.lastMsg || '',
          lastMsgTime: chatData.lastMsgTime || 0
        });
      }
    }

    // رتب من الأحدث للأقدم
    chatsArr.sort((a, b) => b.lastMsgTime - a.lastMsgTime);

    // ارسمها
    chatsArr.forEach(chat => {
      const chatDiv = document.createElement('div');
      chatDiv.className = 'chat-item';
      chatDiv.id = 'chat_' + chat.id;
      chatDiv.innerHTML = `
        <div class="avatar">${chat.user.name[0]}</div>
        <div class="chat-info">
          <div class="chat-top">
            <span class="chat-name">${chat.user.name}</span>
            <span class="chat-time">${formatTime(chat.lastMsgTime)}</span>
          </div>
          <div class="chat-bottom">
            <span class="last-msg">${chat.lastMsg}</span>
          </div>
        </div>
      `;
      chatDiv.addEventListener('click', () => {
        const chatId = [currentUser.uid, chat.id].sort().join('_');
        listenMessages(chatId, chat.id);
        showScreen('chatScreen');
        document.getElementById('chatUserName').textContent = chat.user.name;
      });
      chatsList.appendChild(chatDiv);
    });
  });
}







// دالة تنسيق الوقت
function formatTime(timestamp) {
  if (!timestamp) return '';
  const date = new Date(timestamp);
  const now = new Date();
  const diff = now - date;

  if (diff < 86400000) { // أقل من يوم
    return date.toLocaleTimeString('ar', {hour: '2-digit', minute: '2-digit'});
  }
  return date.toLocaleDateString('ar');
}

/* ===== 9. ربط أزرار إنشاء واسترجاع الحساب ===== */
document.getElementById('btnSignup').addEventListener('click', () => {
  const name = document.getElementById('signupName').value;
  const pass = document.getElementById('signupPass').value;
  createAccount(name, pass);
});

document.getElementById('btnRestore').addEventListener('click', () => {
  const number = document.getElementById('restoreNumber').value;
  const pass = document.getElementById('restorePass').value;
  restoreAccount(number, pass);
});

/* ===== 10. ربط زر الإرسال ===== */
document.getElementById('btnSend').addEventListener('click', () => {
  const text = document.getElementById('messageInput').value;
  sendMessage(text);
});

/* ===== 11. تسجيل الخروج ===== */
document.getElementById('btnLogout').addEventListener('click', () => {
  localStorage.removeItem('wa_haroon_user');
  currentUser = null;
  
  // امسح كل الحقول
  document.getElementById('signupName').value = '';
  document.getElementById('signupPass').value = '';
  document.getElementById('restoreNumber').value = '';
  document.getElementById('restorePass').value = '';
  
  // اخفي الفورمات
  document.getElementById('signupForm').style.display = 'none';
  document.getElementById('restoreForm').style.display = 'none';
  
  showScreen('loginScreen');
  closeModal();
  showToast("تم تسجيل الخروج");
});
</script>
</body>
</html>
