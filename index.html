<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <!-- ترميز UTF-8 عشان يدعم العربية والايموجي بدون خربطة -->
  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- width=device-width: يخلي العرض على قد شاشة الجوال -->
  <!-- viewport-fit=cover: يملأ الشاشة كاملة حتى تحت النوتش في الايفون -->
  
  <meta name="theme-color" content="#111b21">
  <!-- لون الشريط العلوي للمتصفح على الجوال -->
  
  <title>واتساب هارون</title>

  <style>
    /* ====== 1. متغيرات الألوان العامة ====== */
    /* نستخدم متغيرات عشان نغير الثيم كامل بتغيير سطر واحد */
   :root {
  --bg-dark: #111b21;      /* هيدر */
  --bg-panel: #202c33;     /* فوتر */
  --bg-chat-list: #0b141a; /* وسط الواجهة - غيرت الاسم من bg-chat */
  --bg-message-me: #005c4b;
  --bg-message-other: #202c33;
  --text-primary: #e9edef;
  --text-secondary: #8696a0;
  --accent-green: #25d366;
  --border-color: #2a3942;
}



    /* ====== 2. إعادة الضبط العام Reset ====== */
    /* نشيل الهوامش والبادينج الافتراضي من كل العناصر */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent; 
      /* يلغي اللون الأزرق اللي يطلع عند الضغط على الجوال */
    }

    /* منع التحديد والنسخ واللصق لكل العناصر */
    /* بنسمح بالنسخ واللصق فقط لحقل الكتابة لاحقاً بالـ JS */
    body, div, span, p, h1, h2, h3, button, li {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    /* ====== 3. إعدادات الجسم الأساسي Body ====== */
    body {
      height: 100dvh; /* dvh = Dynamic Viewport Height. يحل مشكلة شريط المتصفح بالجوال */
      width: 100vw;
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      /* خط النظام عشان يكون سريع ومألوف للمستخدم */
      display: flex;
      flex-direction: column;
      overflow: hidden; /* نمنع سكرول الجسم كامل. السكرول يكون داخل العناصر فقط */
    }

    /* ====== 4. الشاشات الرئيسية ====== */
    /* كل شاشة تملأ كامل الصفحة وتختفي بالافتراضي */
    .screen {
      display: none; /* مخفي بالافتراضي */
      flex-direction: column;
      height: 100dvh;
      width: 100vw;
      position: relative;
    }

    /* الشاشة النشطة فقط هي اللي تظهر */
    .screen.active {
      display: flex;
    }

    /* ====== 5. الأزرار العامة ====== */
    button {
      background: var(--accent-green);
      color: var(--bg-dark);
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s; 
      /* تأثير خفيف عند الضغط */
    }

    button:active {
      opacity: 0.8; /* يخفت الزر لما تضغطه */
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ====== 6. الحقول العامة Input ====== */
    /* ====== 6. الحقول العامة Input ====== */
input, textarea {
  background: var(--bg-panel);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 16px; /* مهم: يمنع الزوم التلقائي في الايفون */
  outline: none;
  text-align: center;
}

    input:focus {
      border-color: var(--accent-green); /* يتلون الحد أخضر لما تضغط على الحقل */
    }

    /* ====== 7. المودال والاوفرلاي ====== */
    /* الطبقة الشفافة اللي تغطي الشاشة لما يفتح مودال */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5); /* أسود شفاف */
      z-index: 1000; /* يخليه فوق كل شيء */
    }

    .overlay.active {
      display: block; /* يظهر لما نضيف class active */
    }

    /* الصندوق المنبثق نفسه */
    .modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%); /* يخلي المودال وسط الشاشة تماماً */
      background: var(--bg-panel);
      border-radius: 12px;
      padding: 20px;
      z-index: 1001;
      min-width: 280px;
      max-width: 90%;
    }

    .modal.active {
      display: block;
    }

    /* ====== 8. التوست Toast للرسائل المؤقتة ====== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-panel);
      color: var(--text-primary);
      padding: 12px 24px;
      border-radius: 8px;
      display: none;
      z-index: 2000;
    }

    .toast.show {
      display: block;
      animation: fadeInOut 3s forwards;
    }

.send-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #25d366; /* أخضر الواتساب */
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  cursor: pointer;
  flex-shrink: 0;
  padding: 0;
}

.send-btn:active {

}

.send-btn svg {
  transform: rotate(0deg); /* يميل السهم 45 درجة */
  margin-left: 0; 
  margin-right: 2px; /* يضبطه في النص */
}

    @keyframes fadeInOut {
      0% { opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; }
    }

<style>

<script>
/* ========== القسم 3: JavaScript - المنطق والتحكم بالواجهة ========== */

/* ===== 1. متغيرات الحالة العامة ===== */
let currentUser = null; 
// بيانات المستخدم الحالي: uid, name, number. نقراه من localStorage

let activeScreen = 'login'; 
// يتتبع الشاشة الظاهرة الحين: login, chats, chat

let activeModal = null; 
// يتتبع المودال المفتوح الحين عشان نقفله لو ضغط المستخدم برا

/* ===== 2. دالة الانتقال بين الشاشات ===== */
function showScreen(screenId) {
  // يخفي كل الشاشات
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

/* ===== 2. توليد رقم مستخدم فريد 7 خانات يبدأ بـ 71 ===== */
/* 
  الشكل: 71XXXXX
    - 71 ثابتة في البداية
    - 5 أرقام عشوائية من 00000 إلى 99999
    - نتحقق من قاعدة البيانات عشان ما يتكرر الرقم
    - لو فشل 20 مرة نوقف ونرمي خطأ
*/
async function generateUniqueNumber() {
  let attempts = 0;
  const maxAttempts = 20;

  while (attempts < maxAttempts) {
    // ولّد 5 أرقام عشوائية: 10000 إلى 99999
    const rand = Math.floor(10000 + Math.random() * 90000);
    const number = '71' + rand; // النتيجة 7 خانات

    // شوف إذا الرقم مستخدم من قبل
    const usersSnap = await get(ref(db, 'users'));
    if (!usersSnap.exists()) {
      // ما فيه مستخدمين، الرقم فاضي
      return number;
    }

    const users = usersSnap.val();
    const exists = Object.values(users).some(u => u.number === number);

    if (!exists) {
      // الرقم فاضي، ارجعه
      return number;
    }

    attempts++; // جرب مرة ثانية لو الرقم موجود
  }

  // لو وصلنا هنا يعني فشلنا نلاقي رقم فاضي
  throw new Error("تعذر توليد رقم فريد بعد 20 محاولة. جرب مرة ثانية");
}

let currentChatId = null;
let currentChatOtherId = null;

async function sendMessage(text) {
  // فحص 1: لو المستخدم موقف امنع الإرسال فوراً
  if (currentUser.status === "banned") {
    showToast("حسابك موقف من قبل الإدارة");
    return;
  }

  // فحص 2: الشروط القديمة
  if (!text.trim() || !currentChatId || !currentUser) return;
  
  const msgRef = push(ref(db, `chats/${currentChatId}/messages`));
  await set(msgRef, {
    from: currentUser.uid,
    text: text,
    time: serverTimestamp(),
    status: 'sent'
  });
  
  await update(ref(db, `userChats/${currentUser.uid}/${currentChatOtherId}`), {
    lastMsg: text,
    lastMsgTime: serverTimestamp()
  });
  
  await update(ref(db, `userChats/${currentChatOtherId}/${currentUser.uid}`), {
    lastMsg: text,
    lastMsgTime: serverTimestamp()
  });
  
  document.getElementById('messageInput').value = '';
}

/* ===== 6. سماع الرسائل لحظياً ===== */
function listenMessages(chatId, otherId) {
  // فحص: لو المستخدم موقف لا تشترك ولا تعرض رسائل
  if (currentUser.status === "banned") return;

  // افصل الاشتراك القديم لو موجود
  if (messagesUnsubscribe) messagesUnsubscribe();

  currentChatId = chatId;
  currentChatOtherId = otherId;
  
  const messagesRef = ref(db, `chats/${chatId}/messages`);
  
  // خزن دالة الالغاء في المتغير
  messagesUnsubscribe = onValue(messagesRef, (snapshot) => {
    const messagesList = document.getElementById('messagesList');
    messagesList.innerHTML = '';
    
    if (snapshot.exists()) {
      const messages = snapshot.val();
      Object.values(messages).forEach(msg => {
        const msgDiv = document.createElement('div');
        msgDiv.className = msg.from === currentUser.uid ? 'msg-me' : 'msg-other';
        msgDiv.textContent = msg.text;
        messagesList.appendChild(msgDiv);
      });
      messagesList.scrollTop = messagesList.scrollHeight;
    }
  });
}

/* ===== 7. تحميل قائمة المحادثات ===== */
let chatsUnsubscribe = null;
let messagesUnsubscribe = null;

function loadChatsList() {
  if (!currentUser) return;

  if (chatsUnsubscribe) chatsUnsubscribe();

  const chatsRef = ref(db, `userChats/${currentUser.uid}`);
  chatsUnsubscribe = onValue(chatsRef, async (snapshot) => {
    const chatsList = document.getElementById('chatsList');
    chatsList.innerHTML = '';

    if (!snapshot.exists()) return;

    let chatsArr = [];
    const chats = snapshot.val();

    // حولها لمصفوفة عشان نقدر نرتبها
    for (const [otherId, chatData] of Object.entries(chats)) {
      const userSnap = await get(ref(db, `users/${otherId}`));
      if (userSnap.exists()) {
        chatsArr.push({
          id: otherId,
          user: userSnap.val(),
          lastMsg: chatData.lastMsg || '',
          lastMsgTime: chatData.lastMsgTime || 0
        });
      }
    }

    // رتب من الأحدث للأقدم
    chatsArr.sort((a, b) => b.lastMsgTime - a.lastMsgTime);

    // ارسمها
    chatsArr.forEach(chat => {
      const chatDiv = document.createElement('div');
      chatDiv.className = 'chat-item';
      chatDiv.id = 'chat_' + chat.id;
      chatDiv.innerHTML = `
        <div class="avatar">${chat.user.name[0]}</div>
        <div class="chat-info">
          <div class="chat-top">
            <span class="chat-name">${chat.user.name}</span>
            <span class="chat-time">${formatTime(chat.lastMsgTime)}</span>
          </div>
          <div class="chat-bottom">
            <span class="last-msg">${chat.lastMsg}</span>
          </div>
        </div>
      `;
      chatDiv.addEventListener('click', () => {
        const chatId = [currentUser.uid, chat.id].sort().join('_');
        listenMessages(chatId, chat.id);
        showScreen('chatScreen');
        document.getElementById('chatUserName').textContent = chat.user.name;
      });
      chatsList.appendChild(chatDiv);
    });
  });
}







// دالة تنسيق الوقت
function formatTime(timestamp) {
  if (!timestamp) return '';
  const date = new Date(timestamp);
  const now = new Date();
  const diff = now - date;

  if (diff < 86400000) { // أقل من يوم
    return date.toLocaleTimeString('ar', {hour: '2-digit', minute: '2-digit'});
  }
  return date.toLocaleDateString('ar');
}

document.getElementById('btnSearch').addEventListener('click', async () => {
  const number = document.getElementById('searchNumber').value.trim();
  if (!number) {
    loadChatsList(); // لو فاضي رجع اعرض الكل
    return;
  }
  
  const usersSnap = await get(ref(db, 'users'));
  if (!usersSnap.exists()) {
    showToast("لا يوجد مستخدم بهذا الرقم");
    return;
  }
  
  const users = usersSnap.val();
  const userEntry = Object.entries(users).find(([uid, u]) => u.number === number);
  
  if (!userEntry) {
    showToast("لا يوجد مستخدم بهذا الرقم");
    return;
  }
  
  const [uid, userData] = userEntry;
  if (uid === currentUser.uid) {
    showToast("هذا انت");
    return;
  }
  
  const chatsList = document.getElementById('chatsList');
  
  // شلنا مسح القائمة كاملة. بنفحص لو النتيجة موجودة مسبقاً
  const existingItem = document.getElementById('search_' + uid);
  if (existingItem) {
    existingItem.scrollIntoView({ behavior: 'smooth', block: 'start' });
    existingItem.style.background = 'var(--bg-panel)';
    setTimeout(() => existingItem.style.background = '', 1000);
    document.getElementById('searchNumber').value = '';
    return;
  }
  
  // اعرض المستخدم اللي لقيته فوق القائمة
  const chatDiv = document.createElement('div');
  chatDiv.className = 'chat-item';
  chatDiv.id = 'search_' + uid; // ID مميز عشان ما يتكرر
  chatDiv.style.borderBottom = '2px solid var(--accent-green)'; // خط اخضر عشان يبين انه نتيجة بحث
  chatDiv.innerHTML = `
    <div class="avatar">${userData.name[0]}</div>
    <div class="chat-info">
      <div class="chat-top">
        <span class="chat-name">${userData.name}</span>
        <span class="chat-time">بحث</span>
      </div>
      <div class="chat-bottom">
        <span class="last-msg">اضغط لبدء المحادثة</span>
      </div>
    </div>
  `;
  
  chatDiv.addEventListener('click', async () => {
    const chatId = [currentUser.uid, uid].sort().join('_');
    await set(ref(db, `userChats/${currentUser.uid}/${uid}`), {
      lastMsg: "",
      lastMsgTime: serverTimestamp()
    });
    listenMessages(chatId, uid);
    showScreen('chatScreen');
    document.getElementById('chatUserName').textContent = userData.name;
    document.getElementById('searchNumber').value = '';
    // شلنا loadChatsList() من هنا عشان ما يعيد رسم القائمة كلها
  });
  
  // حطه اول عنصر في القائمة
  if (chatsList.firstChild) {
    chatsList.insertBefore(chatDiv, chatsList.firstChild);
  } else {
    chatsList.appendChild(chatDiv);
  }
  
  document.getElementById('searchNumber').value = '';
});

/* مودال عرض المستخدمين */
function openAdminUsersModal() {
  const html = `
    <div id="adminUsersModal" class="modal active">
      <h3 style="margin-bottom:12px">البحث عن مستخدم</h3>
      <div style="display:flex; gap:8px; margin-bottom:12px">
        <input type="text" id="adminSearchInput" placeholder="ابحث بالاسم او الرقم" style="flex:1">
        <button id="btnAdminSearch">بحث</button>
      </div>
      <div id="adminSearchResults" style="max-height:200px; overflow-y:auto; margin-bottom:12px"></div>
      <div id="adminUserActions" style="display:none; flex-direction:column; gap:8px">
        <button id="btnViewUser">عرض المعلومات</button>
        <button id="btnEditUser">تعديل الحساب</button>
        <button id="btnBanUser">إيقاف المستخدم</button>
        <button id="btnUnbanUser">إلغاء الإيقاف</button>
        <button id="btnDeleteUser" style="background:#d32f2f">حذف المستخدم</button>
      </div>
      <button onclick="closeModal()" style="margin-top:12px">إغلاق</button>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('modalOverlay').classList.add('active');

  let selectedUser = null;

  document.getElementById('btnAdminSearch').onclick = async () => {
    const query = document.getElementById('adminSearchInput').value.trim();
    const resultsDiv = document.getElementById('adminSearchResults');
    resultsDiv.innerHTML = '';

    const snap = await get(ref(db, 'users'));
    if (!snap.exists()) return;

    const users = Object.entries(snap.val());
    let filtered = users.filter(([uid, u]) =>
      u.name.startsWith(query) || u.number === query
    );

    filtered.forEach(([uid, u]) => {
      const div = document.createElement('div');
      div.className = 'chat-item';
      div.innerHTML = `<div class="chat-info">
        <span class="chat-name">${u.name} ${u.status==='banned'?'[موقف]':''}</span>
        <span class="last-msg">${u.number}</span>
      </div>`;
      div.onclick = () => {
        selectedUser = {uid,...u};
        document.getElementById('adminUserActions').style.display = 'flex';
        resultsDiv.innerHTML = '';
        resultsDiv.appendChild(div);
      };
      resultsDiv.appendChild(div);
    });
  };

  // أزرار الإجراءات
  document.getElementById('btnViewUser').onclick = () => {
    if (!selectedUser) return;
    alert(`الاسم: ${selectedUser.name}\nالرقم: ${selectedUser.number}\nكلمة المرور: ${selectedUser.password}\nالإنشاء: ${new Date(selectedUser.createdAt).toLocaleString('ar')}`);
  };

  document.getElementById('btnEditUser').onclick = async () => {
    const newName = prompt("الاسم الجديد:", selectedUser.name);
    const newPass = prompt("كلمة المرور الجديدة:", selectedUser.password);
    if (newName && newPass) {
      await update(ref(db, `users/${selectedUser.uid}`), {
        name: newName,
        password: newPass
      });
      showToast("تم التعديل");
      closeModal();
    }
  };

  document.getElementById('btnBanUser').onclick = async () => {
    await update(ref(db, `users/${selectedUser.uid}`), {status: "banned"});
    showToast("تم إيقاف المستخدم");
    closeModal();
  };

  document.getElementById('btnUnbanUser').onclick = async () => {
    await remove(ref(db, `users/${selectedUser.uid}/status`));
    showToast("تم إلغاء الإيقاف");
    closeModal();
  };

  document.getElementById('btnDeleteUser').onclick = async () => {
    if (confirm("متأكد من حذف المستخدم؟")) {
      await remove(ref(db, `users/${selectedUser.uid}`));
      await remove(ref(db, `userChats/${selectedUser.uid}`));
      showToast("تم الحذف");
      closeModal();
    }
  };
}

/* مودال حجز الرقم الذهبي */
function openReserveNumberModal() {
  const html = `
    <div id="reserveNumberModal" class="modal active">
      <h3 style="margin-bottom:12px">حجز رقم ذهبي</h3>
      <input type="text" id="goldName" placeholder="اسم المستخدم">
      <input type="password" id="goldPass" placeholder="كلمة المرور الابتدائية" style="margin-top:8px">
      <input type="text" id="goldNumber" placeholder="الرقم الذهبي 71XXXXX" maxlength="7" style="margin-top:8px">
      <button id="btnSaveGold" style="margin-top:12px">حفظ</button>
      <button onclick="closeModal()" style="margin-top:8px">إلغاء</button>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('modalOverlay').classList.add('active');

  document.getElementById('goldNumber').oninput = (e) => {
    e.target.value = e.target.value.replace(/\D/g, '').slice(0,7);
  };

  document.getElementById('btnSaveGold').onclick = async () => {
    const name = document.getElementById('goldName').value;
    const pass = document.getElementById('goldPass').value;
    const number = document.getElementById('goldNumber').value;

    if (!name ||!pass ||!number.startsWith('71') || number.length!== 7) {
      showToast("البيانات غير صحيحة");
      return;
    }

    const snap = await get(ref(db, 'users'));
    const exists = Object.values(snap.val()).some(u => u.number === number);
    if (exists) {
      showToast("الرقم مستخدم");
      return;
    }

    const userId = 'user_' + Date.now();
    await set(ref(db, `users/${userId}`), {
      name, password: pass, number, createdAt: serverTimestamp()
    });

    showToast("تم حجز الرقم الذهبي");
    closeModal();
  };
}
