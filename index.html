const formatTime = ts => {
  if(!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit'});
};
const formatLastSeen = ts => {
  if(!ts) return 'غير متصل';
  const diff = Date.now() - ts;

};

window.toggleMyPass = () => {
  if(!myPassword) myPassword = sessionStorage.getItem('myPass') || '';

  $('myPass').textContent = passVisible && myPassword? myPassword : '••••••';
};
window.toggleEye = id => {
  const inp = $(id);
  inp.type = inp.type === 'password'? 'text' : 'password';
};
// تعديل رقم 2: منع تكرار إنشاء الحساب
window.createAccount = async () => {
  if(isCreatingAccount) return;
  isCreatingAccount = true;
  const name = $('signupName').value.trim();
  const pass = $('signupPass').value.trim();
  const err = $('signupError');
  err.textContent = '';
  if(name.length < 3) { isCreatingAccount = false; return err.textContent = 'الاسم 3 أحرف على الأقل'; }
  if(pass.length < 6) { isCreatingAccount = false; return err.textContent = 'كلمة المرور 6 أرقام على الأقل'; }

  const weak = ['000000','111111','123123','112233','123321'];
  if(weak.includes(pass)) { isCreatingAccount = false; return err.textContent = 'كلمة المرور ضعيفة جداً'; }

const loadChats = () => {

window.startChatFromSearch = async (uid, name) => {
  $('searchNumber').value = '';

  const chatRef = ref(db, `userChats/${currentUser.uid}/${uid}`);
  const chatSnap = await get(chatRef);

  if(!chatSnap.exists()) {
    const initChat = {
      lastMsg: '',
      lastMsgTime: Date.now(), // تعديل رقم 6: يطلع فوق
      unreadCount: 0,
      withUid: uid,
      withName: name
    };
    await set(chatRef, initChat);
    await set(ref(db, `userChats/${uid}/${currentUser.uid}`), {
      lastMsg: '',
      lastMsgTime: Date.now(),
      unreadCount: 0,
      withUid: currentUser.uid,
      withName: currentUser.name
    });
  }

  openChat({uid: uid, name: name});
};
window.openChat = async user => {
  currentChat = user;
  $('chatName').textContent = user.name;
  $('chatNumber').textContent = user.uid;
  $('chatAvatar').textContent = user.name[0];
  $('chatScreen').classList.remove('hidden');
  $('chatsScreen').classList.add('hidden');
  $('messagesList').innerHTML = '';
  replyTo = null;
  oldestMsgTime = null;
  await set(ref(db, `userChats/${currentUser.uid}/${currentChat.uid}/unreadCount`), 0);
  updateReplyUI();
  const chatID = getChatID(currentUser.uid, user.uid);
  if (statusListener) off(statusListener);
  statusListener = ref(db, 'users/'+user.uid+'/lastSeen');
  onValue(statusListener, s => { $('chatStatus').textContent = formatLastSeen(s.val()); });
  if (typingListener) off(typingListener);
  typingListener = ref(db, `chats/${chatID}/typing/${user.uid}`);
  onValue(typingListener, s => {
    if(s.val()) {
      $('chatStatus').textContent = `${user.name} يكتب...`;
    } else {
      onValue(ref(db, 'users/'+user.uid+'/lastSeen'), ss => {
        $('chatStatus').textContent = formatLastSeen(ss.val());
      }, {onlyOnce: true});
    }
  });
  if (msgListener) off(msgListener);
  msgListener = query(ref(db, `chats/${chatID}/messages`), limitToLast(20));
  onChildAdded(msgListener, snap => {
    renderMessage(snap.key, snap.val());
    if(snap.val().sender!== currentUser.uid && navigator.vibrate) navigator.vibrate(50);
    if (!oldestMsgTime || snap.val().time < oldestMsgTime) oldestMsgTime = snap.val().time;
  });
  const msgsRef = ref(db, `chats/${chatID}/messages`);
  onChildChanged(msgsRef, snap => {
    const msg = snap.val();
    const msgEl = $('msg_'+snap.key);
    if(msgEl && msg.sender === currentUser.uid) {
      let statusIcon = '';
      if(msg.status === 'sent') statusIcon = '✓';
      else if(msg.status === 'delivered') statusIcon = '✓✓';
      else if(msg.status === 'read') statusIcon = '<span style="color:#53bdeb">✓✓</span>';
      msgEl.querySelector('div > div:last-child').innerHTML = `${msg.edited? '<span style="font-size:10px; color:#8696a0; margin-right:4px">معدلة</span>' : ''}${formatTime(msg.time)} ${statusIcon}`;
    }
  });
  get(msgsRef).then(snap => {
    const updates = {};
    snap.forEach(s => {
      const msg = s.val();
      if(msg.sender!== currentUser.uid && msg.status!== 'read') {
        updates[`chats/${chatID}/messages/${s.key}/status`] = 'read';
      }
    });
    if(Object.keys(updates).length > 0) update(ref(db), updates);
  });
  setTimeout(fixBars, 100);
};

// تعديل رقم 12: رسائلك يمين أخضر، رسائل الطرف الثاني يسار رمادي
const renderMessage = async (id, msg, insertTop = false) => {
  const isMe = msg.sender === currentUser.uid;
  const chatID = getChatID(currentUser.uid, currentChat?.uid || '');
  if(chatID && currentChat) {
    const deletedSnap = await get(ref(db, `userDeletedMsgs/${currentUser.uid}/${chatID}/${id}`));
    if(deletedSnap.exists()) return;
  }
  if(msg.deleted) {
    const div = document.createElement('div');
    div.className = `msg ${isMe? 'msg-me' : 'msg-other'}`;
    div.id = 'msg_'+id;
    div.style.cssText = `display:flex; margin:6px 0; ${isMe?'justify-content:flex-end':'justify-content:flex-start'}; opacity:0.6;`;
    div.innerHTML = `
      <div style="background:#2a3942; color:#8696a0; padding:8px 12px; border-radius:8px; max-width:75%; font-style:italic">
        🚫 تم حذف هذه الرسالة
      </div>
    `;
    if (insertTop) $('messagesList').insertBefore(div, $('messagesList').firstChild);
    else $('messagesList').appendChild(div);
    if (!insertTop) $('messagesList').scrollTop = $('messagesList').scrollHeight;
    return;
  }
  if(isMe && msg.status === 'sent' && currentChat) {
    update(ref(db, `chats/${getChatID(currentUser.uid, currentChat.uid)}/messages/${id}`), {status: 'delivered'});
  }
  const div = document.createElement('div');
  div.className = `msg ${isMe? 'msg-me' : 'msg-other'}`;
  div.id = 'msg_'+id;
  div.style.cssText = `display:flex; margin:6px 0; ${isMe?'justify-content:flex-end':'justify-content:flex-start'};`;
  let pressTimer, startX = 0, startY = 0, isDragging = false;
  div.ontouchstart = div.onmousedown = (e) => {
    startX = e.touches? e.touches[0].clientX : e.clientX;
    startY = e.touches? e.touches[0].clientY : e.clientY;
    isDragging = false;
    pressTimer = setTimeout(() => {
      if(!isDragging) {
        e.preventDefault();
        showMsgMenu(id, isMe);
        if(navigator.vibrate) navigator.vibrate(50);
      }
    }, 500);
  };
  div.ontouchmove = div.onmousemove = (e) => {
    if(!startX) return;
    const currentX = e.touches? e.touches[0].clientX : e.clientX;
    const currentY = e.touches? e.touches[0].clientY : e.clientY;
    const diffX = currentX - startX;
    const diffY = Math.abs(currentY - startY);
    if(diffX > 30 && diffY < 50) {
      isDragging = true;
      clearTimeout(pressTimer);
      div.style.transform = `translateX(${Math.min(diffX, 60)}px)`;
      div.style.transition = 'none';
    }
  };
  div.ontouchend = div.onmouseup = div.onmouseleave = (e) => {
    clearTimeout(pressTimer);
    const currentX = e.changedTouches? e.changedTouches[0].clientX : e.clientX;
    const diffX = currentX - startX;
    if(isDragging && diffX > 50) {
      replyMessage(id);
      if(navigator.vibrate) navigator.vibrate(30);
    }
    div.style.transform = 'translateX(0)';
    div.style.transition = 'transform 0.2s';
    startX = 0;
    isDragging = false;
  };
  let statusIcon = '';
  let editedTag = msg.edited? '<span style="font-size:10px; color:#8696a0; margin-right:4px">معدلة</span>' : '';
  if(isMe) {
    if(msg.status === 'sent') statusIcon = '✓';
    else if(msg.status === 'delivered') statusIcon = '✓✓';
    else if(msg.status === 'read') statusIcon = '<span style="color:#53bdeb">✓✓</span>';
  }
  let replyHTML = '';
  if(msg.replyTo) {
    replyHTML = `
      <div style="background:#00000030; padding:6px 10px; border-radius:6px; margin-bottom:6px; border-right:3px solid #00a884; font-size:13px">
        <div style="color:#00a884; font-weight:500">${msg.replyTo.name}</div>
        <div style="color:#8696a0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${msg.replyTo.text}</div>
      </div>
    `;
  }
  let contentHTML = '';
  if(msg.type === 'text') contentHTML = msg.text;
  else if(msg.type === 'audio') contentHTML = `<audio controls src="${msg.data}" style="max-width:240px"></audio>`;
  // تعديل رقم 12: لون الرسائل صحيح
  div.innerHTML = `
    <div style="background:${isMe?'#005c4b':'#202c33'}; color:#e9edef; padding:8px 12px; border-radius:8px; max-width:75%; position:relative; box-shadow:0 1px #00000030">
      ${replyHTML}
      <div style="word-wrap:break-word">${contentHTML}</div>
      <div style="text-align:left; font-size:11px; color:#ffffff99; margin-top:4px">
        ${editedTag}${formatTime(msg.time)} ${statusIcon}
      </div>
    </div>
  `;
  if (insertTop) $('messagesList').insertBefore(div, $('messagesList').firstChild);
  else $('messagesList').appendChild(div);
  if (!insertTop) $('messagesList').scrollTop = $('messagesList').scrollHeight;
};

window.sendMessage = async () => {
  const text = $('msgInput').value.trim();
  if(!text ||!currentChat) return;
  $('msgInput').value = '';
  setTyping(false);
  const chatID = getChatID(currentUser.uid, currentChat.uid);
  const newMsgRef = push(ref(db, `chats/${chatID}/messages`));
  const msgData = {
    text, type: 'text', sender: currentUser.uid,
    time: Date.now(), // تعديل رقم 10: لحظي
    status: 'sent'
  };
  if(replyTo) msgData.replyTo = replyTo;
  const updates = {};
  updates[`chats/${chatID}/messages/${newMsgRef.key}`] = msgData;
  updates[`userChats/${currentUser.uid}/${currentChat.uid}/lastMsg`] = text;
  updates[`userChats/${currentUser.uid}/${currentChat.uid}/lastMsgTime`] = Date.now();
  updates[`userChats/${currentChat.uid}/${currentUser.uid}/lastMsg`] = text;
  updates[`userChats/${currentChat.uid}/${currentUser.uid}/lastMsgTime`] = Date.now();
  updates[`userChats/${currentChat.uid}/${currentUser.uid}/unreadCount`] = increment(1);
  await update(ref(db), updates); // تعديل رقم 10: update واحد = لحظي
  replyTo = null;
  updateReplyUI();
};

window.editMessage = async (id) => {
  const snap = await get(ref(db, `chats/${getChatID(currentUser.uid, currentChat.uid)}/messages/${id}`));
  const msg = snap.val();
  if(msg.type!== 'text') return showToast('ما تقدر تعدل إلا الرسائل النصية');
  const newText = prompt('عدل رسالتك:', msg.text);
  if(newText === null || newText.trim() === '' || newText === msg.text) return;
  await update(ref(db, `chats/${getChatID(currentUser.uid, currentChat.uid)}/messages/${id}`), {
    text: newText.trim(), edited: true, editedAt: Date.now()
  });
  showToast('تم التعديل', '#00a884');
};

// تعديل رقم 9: تسجيل بالضغط المطول
window.startRecord = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.start();
    showToast('جاري التسجيل... ارفع إصبعك للإرسال', '#00a884');
    $('micBtn').style.color = '#f15c6d';
  } catch { showToast('المايك مرفوض'); }
};

window.stopRecord = () => {
  if(!mediaRecorder) return;
  $('micBtn').style.color = '#aebac1';
  mediaRecorder.stop();
  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, {type: 'audio/webm'});
    const reader = new FileReader();
    reader.onloadend = async () => {
      const base64Audio = reader.result;
      const chatID = getChatID(currentUser.uid, currentChat.uid);
      const msgRef = push(ref(db, `chats/${chatID}/messages`));
      await set(msgRef, {
        type: 'audio', data: base64Audio, sender: currentUser.uid,
        time: Date.now(), status: 'sent' // تعديل رقم 10: لحظي
      });
      const updates = {};
      updates[`userChats/${currentUser.uid}/${currentChat.uid}/lastMsg`] = '🎤 رسالة صوتية';
      updates[`userChats/${currentUser.uid}/${currentChat.uid}/lastMsgTime`] = Date.now();
      updates[`userChats/${currentChat.uid}/${currentUser.uid}/lastMsg`] = '🎤 رسالة صوتية';
      updates[`userChats/${currentChat.uid}/${currentUser.uid}/lastMsgTime`] = Date.now();
      updates[`userChats/${currentChat.uid}/${currentUser.uid}/unreadCount`] = increment(1);
      await update(ref(db), updates);
    };
    reader.readAsDataURL(blob);
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
  };
};

window.changePassword = async () => {
  const oldPass = $('oldPass').value.trim();
  const newPass = $('newPass').value.trim();
  const err = $('changePassError');
  err.textContent = '';
  if(!oldPass ||!newPass) return err.textContent = 'املأ كل الحقول';
  if(newPass.length < 6) return err.textContent = 'الجديدة 6 أرقام على الأقل';
  if(/^(\d)\1+$/.test(newPass)) return err.textContent = 'كلمة المرور ضعيفة - أرقام مكررة';
  if(/012345|123456|234567|345678|456789|987654|876543|765432|654321|543210/.test(newPass))
    return err.textContent = 'كلمة المرور ضعيفة - أرقام متتالية';
  const weak = ['000000','111','123123','112233','123321'];
  if(weak.includes(newPass)) return err.textContent = 'كلمة المرور ضعيفة جداً';
  try {
    const user = auth.currentUser;
    const snap = await get(ref(db, 'users/'+user.uid));
    const email = snap.val().email;
    await signInWithEmailAndPassword(auth, email, oldPass);
    await updatePassword(user, newPass);
    myPassword = newPass;
    sessionStorage.setItem('myPass', newPass);
    $('changePassPopup').remove();
    showToast('تم تغيير كلمة المرور بنجاح', '#00a884');
  } catch(e) {
    err.textContent = 'كلمة المرور الحالية غلط';
  }
};

window.showColorPanel = target => {

    document.onclick = e => {
      if(!panel.contains(e.target) &&!e.target.closest('.menu-item')) {

        document.onclick = null;
      }

};

$('messagesList').addEventListener('scroll', async () => {
  if ($('messagesList').scrollTop === 0 &&!loadingOld && currentChat && oldestMsgTime) {
    loadingOld = true;
    const chatID = getChatID(currentUser.uid, currentChat.uid);
    const oldestSnap = await get(
      query(
        ref(db, `chats/${chatID}/messages`),
        orderByChild('time'),
        endBefore(oldestMsgTime),
        limitToLast(50)
      )
    );
    const msgs = [];
    oldestSnap.forEach(s => msgs.push({id: s.key,...s.val()}));
    msgs.reverse().forEach(msg => {
      renderMessage(msg.id, msg, true);
    });
    if (msgs.length > 0) oldestMsgTime = msgs[0].time;
    loadingOld = false;
  }
});

if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'haroon-v5';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['./'])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k!== CACHE_NAME).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      if(e.request.url.includes('firebase') || e.request.method!== 'GET') return;
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          const resClone = res.clone();
          caches.open(CACHE_NAME).then(c => c.put(e.request, resClone));
          return res;
        }))
      );
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
