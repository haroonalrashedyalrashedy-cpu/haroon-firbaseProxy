<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#111b21">
  <title>واتساب هارون</title>

  <style>
    /* ====== 1. متغيرات الألوان العامة ====== */
   :root {
  --bg-dark: #111b21; --bg-panel: #202c33; --bg-chat-list: #0b141a;
  --bg-message-me: #005c4b; --bg-message-other: #202c33;
  --text-primary: #e9edef; --text-secondary: #8696a0;
  --accent-green: #25d366; --border-color: #2a3942;
  }

    /* ====== 2. إعادة الضبط العام Reset ====== */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body, span, p, h1, h2, h3, button, li {
  user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;
}

    /* ====== 3. إعدادات الجسم الأساسي Body ====== */
    body {
      height: 100dvh; width: 100vw; background: var(--bg-dark); color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ====== 4. الشاشات الرئيسية ====== */
   .screen { display: none; flex-direction: column; height: 100dvh; width: 100vw; position: relative; }
   .screen.active { display: flex; }

    /* ====== 5. الأزرار العامة ====== */
    button { background: var(--accent-green); color: var(--bg-dark); border: none; border-radius: 8px;
      padding: 12px 20px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    button:active { opacity: 0.8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ====== 6. الحقول العامة Input ====== */
    input, textarea { background: var(--bg-panel); color: var(--text-primary); border: 1px solid var(--border-color);
      border-radius: 8px; padding: 12px 16px; font-size: 16px; outline: none; text-align: center; }
    input:focus { border-color: var(--accent-green); }

    /* ====== 7. المودال والاوفرلاي ====== */
   .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5); z-index: 1000; }
   .overlay.active { display: block; }
   .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: var(--bg-panel); border-radius: 12px; padding: 20px; z-index: 1001;
      min-width: 280px; max-width: 90%; }
   .modal.active { display: block; }

    /* ====== 8. التوست Toast ====== */
   .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--bg-panel); color: var(--text-primary); padding: 12px 24px;
      border-radius: 8px; display: none; z-index: 2000; }
   .toast.show { display: block; animation: fadeInOut 3s forwards; }
    @keyframes fadeInOut { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }

   .send-btn { width: 48px; height: 48px; border-radius: 50%; background: #25d366; border: none;
      display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; flex-shrink: 0; padding: 0; }
   .send-btn:active { background: #1ebc57; }
   .send-btn svg { transform: rotate(0deg); margin-left: 0; margin-right: 2px; }

    /* ====== باقي الستايل حقك زي ماهو ====== */
   .login-container { display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; padding: 24px; gap: 20px; max-width: 400px; margin: 0 auto; }
   .logo { font-size: 64px; }
   .app-title { font-size: 28px; font-weight: 700; color: var(--text-primary); }
   .app-subtitle { font-size: 15px; color: var(--text-secondary); text-align: center; }
   .login-buttons { display: flex; gap: 12px; width: 100%; }
   .login-buttons button { flex: 1; }
   .auth-form { display: none; flex-direction: column; gap: 12px; width: 100%; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    #chatsHeader { height: 60px; background: var(--bg-dark); display: flex; justify-content: space-between;
      align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border-color); }
   .user-info { display: flex; flex-direction: column; }
    #currentUserName { font-size: 17px; font-weight: 600; }
    #currentUserNumber { font-size: 13px; color: var(--text-secondary); }
   .icon-btn { background: none; border: none; font-size: 24px; padding: 8px; color: var(--text-primary); }
    #loginScreen, #registerScreen, #recoverScreen { background: #111b21; }
    #chatsList { flex: 1; overflow-y: auto; background: var(--bg-chat-list, #111b21); }
   .chat-item { display: flex; align-items: center; padding: 12px 16px; gap: 12px;
      border-bottom: 1px solid var(--border-color); cursor: pointer; }
   .chat-item:active { background: var(--bg-panel); }
   .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--bg-panel);
      display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; flex-shrink: 0; }
   .chat-info { flex: 1; min-width: 0; }
   .chat-top { display: flex; justify-content: space-between; }
   .chat-name { font-size: 16px; font-weight: 500; }
   .chat-time { font-size: 12px; color: var(--text-secondary); }
   .chat-bottom { display: flex; justify-content: space-between; margin-top: 4px; }
   .last-msg { font-size: 14px; color: var(--text-secondary); white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 70%; }
   .unread-count { background: var(--accent-green); color: var(--bg-dark); font-size: 12px;
      padding: 2px 6px; border-radius: 12px; font-weight: 600; }
    #chatsFooter { height: 64px; background: var(--bg-panel); display: flex; align-items: center;
      padding: 8px 12px; gap: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
    #chatHeader { height: 60px; background: var(--bg-dark); display: flex; align-items: center;
      padding: 0 12px; gap: 12px; border-bottom: 1px solid var(--border-color); }
   .chat-user-info { display: flex; align-items: center; gap: 12px; flex: 1; }
   .chat-user-details { display: flex; flex-direction: column; }
    #chatUserStatus { font-size: 13px; color: var(--text-secondary); }
    #messagesList { flex: 1; overflow-y: auto; background: var(--bg-chat-list, #0b141a);
      padding: 16px; display: flex; flex-direction: column; gap: 8px; }
   .msg-me { align-self: flex-start; background: var(--bg-message-me); color: var(--text-primary);
      padding: 8px 12px; border-radius: 12px 12px 12px 0; max-width: 75%; word-wrap: break-word; }
   .msg-other { align-self: flex-end; background: var(--bg-message-other); color: var(--text-primary);
      padding: 8px 12px; border-radius: 12px 12px 0 12px; max-width: 75%; word-wrap: break-word; }
    #chatInputBar { background: var(--bg-panel); display: flex; align-items: flex-end; padding: 8px 12px;
      gap: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); flex-wrap: nowrap; direction: rtl; flex-direction: row; }
    #messageInput { flex: 1 1 0; min-height: 40px; max-height: 120px; resize: none; min-width: 0;
      user-select: text; -webkit-user-select: text; }
    #emojiPanel { display: none; height: 240px; background: var(--bg-dark); overflow-y: auto;
      grid-template-columns: repeat(8, 1fr); padding: 12px; gap: 8px; }
   
   .emoji-item { font-size: 28px; text-align: center; cursor: pointer; padding: 8px; }
   .emoji-item:active { background: var(--bg-panel); border-radius: 8px; }
   .menu-item { width: 100%; text-align: right; background: none; color: var(--text-primary);
      padding: 14px 16px; border-radius: 0; font-weight: 400; }
   .menu-item:active { background: var(--bg-dark); }
   .tabs { display: flex; border-bottom: 1px solid var(--border-color); margin-bottom: 16px; }
   .tab { flex: 1; background: none; color: var(--text-secondary); padding: 12px; border-radius: 0; }
   .tab.active { color: var(--accent-green); border-bottom: 2px solid var(--accent-green); }
   .colors { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
   .color-item { height: 48px; border-radius: 8px; cursor: pointer; }
   .confirm-buttons { display: flex; gap: 12px; margin-top: 16px; }
   .confirm-buttons button { flex: 1; }
   
   
   
  </style>
</head>

<body>
  <!-- ========== القسم 2: HTML زي ماهو بدون تغيير ========== -->
  <div id="loginScreen" class="screen active">
    <div class="login-container">
      <div class="logo">💬</div>
      <h1 class="app-title">واتساب هارون</h1>
      <p class="app-subtitle">مرحباً بك، سجل دخولك للمتابعة</p>
      <div class="login-buttons">
        <button id="btnShowSignup">إنشاء حساب</button>
        <button id="btnShowRestore">استعادة حساب</button>
      </div>
      <div id="signupForm" class="auth-form">
        <input type="text" id="signupName" placeholder="الاسم" inputmode="text" maxlength="20">
        <input type="password" id="signupPass" placeholder="كلمة المرور" inputmode="numeric" maxlength="10">
        <button id="btnSignup">تسجيل</button>
      </div>
      <div id="restoreForm" class="auth-form">
        <input type="text" id="restoreNumber" placeholder="رقم المستخدم 7 أرقام" inputmode="numeric" maxlength="7">
        <input type="password" id="restorePass" placeholder="كلمة المرور" inputmode="numeric" maxlength="10">
        <button id="btnRestore">دخول</button>
      </div>
    </div>
  </div>

  <div id="chatsScreen" class="screen">
    <header id="chatsHeader">
      <div class="user-info">
        <span id="currentUserName">الاسم</span>
        <span id="currentUserNumber">1234567</span>
      </div>
      
      <button id="btnChatsMenu" class="icon-btn">⋮</button>
    </header>
    <div id="chatsList"></div>
    <footer id="chatsFooter">
      <input type="text" id="searchNumber" placeholder="ابحث برقم المستخدم" inputmode="numeric" maxlength="7">
      <button id="btnSearch">بحث</button>
    </footer>
  </div>

  <div id="chatScreen" class="screen">
    <header id="chatHeader">
      <button id="btnBackToChats" class="icon-btn">←</button>
      <div class="chat-user-info">
        <div class="avatar" id="chatAvatar">H</div>
        <div class="chat-user-details">
          <span id="chatUserName">اسم المستخدم</span>
          <span id="chatUserStatus">متصل الآن</span>
        </div>
      </div>
      <button id="btnChatMenu" class="icon-btn">⋮</button>
    </header>
    <div id="messagesList"></div>
    <footer id="chatInputBar">
      <button id="btnEmoji" class="icon-btn">😀</button>
      <input type="text" id="messageInput" placeholder="اكتب رسالة...">
      <button id="btnVoice" class="icon-btn">🎤</button>
      <button id="btnSend" class="send-btn" aria-label="إرسال">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </footer>
    <div id="emojiPanel"></div>
  </div>

  <div id="modalOverlay" class="overlay"></div>
  <div id="chatsMenuModal" class="modal">
    <button class="menu-item" id="btnChangeTheme">تغيير الألوان</button>
    <button class="menu-item" id="btnChangePass">تغيير كلمة المرور</button>
    <button class="menu-item" id="btnLogout">تسجيل الخروج</button>
  </div>
  <div id="themeModal" class="modal">
    <div class="tabs">
      <button class="tab active" data-tab="header">الشريط العلوي</button>
      <button class="tab" data-tab="chat">وسط الواجهة</button>
      <button class="tab" data-tab="footer">الشريط السفلي</button>
    </div>
    <div class="colors"></div>
  </div>
  <div id="changePassModal" class="modal">
    <input type="password" id="oldPass" placeholder="كلمة المرور القديمة" inputmode="numeric">
    <input type="password" id="newPass" placeholder="كلمة المرور الجديدة" inputmode="numeric">
    <input type="password" id="confirmPass" placeholder="تأكيد كلمة المرور" inputmode="numeric">
    <button id="btnSavePass">حفظ</button>
  </div>
  <div id="confirmModal" class="modal">
    <p id="confirmText">هل أنت متأكد؟</p>
    <div class="confirm-buttons">
      <button id="btnConfirmYes">نعم</button>
      <button id="btnConfirmNo">لا</button>
    </div>
  </div>
  <div id="toast" class="toast"></div>

 
  
  <!-- ========== القسم 3+4+5: كل الجافاسكربت في Module واحد فقط ========== -->
  <script type="module">
    /* استيراد Firebase */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, get, push, onValue, update, remove, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    /* ========== القسم 4: Firebase Config ========== */
    const firebaseConfig = {
      apiKey: "AIzaSyDSWYRUfeO0ruDXO-2lv4tnrqxBVUHXFIs",
      authDomain: "watsapp-haroon.firebaseapp.com",
      databaseURL: "https://watsapp-haroon-default-rtdb.firebaseio.com",
      projectId: "watsapp-haroon",
      storageBucket: "watsapp-haroon.firebasestorage.app",
      messagingSenderId: "85603158090",
      appId: "1:85603158090:web:001303416bd3a68879feb3"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    console.log("[FB] تم الاتصال بقاعدة البيانات");

    /* ========== القسم 3: متغيرات الحالة العامة ========== */
    let currentUser = null;
    let activeScreen = 'login';
    let activeModal = null;
    let chatsUnsubscribe = null;
    let messagesUnsubscribe = null;
    let currentChatId = null;
    let currentChatOtherId = null;

    /* ========== القسم 3: دوال UI ========== */
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
      activeScreen = screenId;
      console.log('[UI] تم الانتقال إلى:', screenId);
    }

    function toggleForm(formType) {
      const signupForm = document.getElementById('signupForm');
      const restoreForm = document.getElementById('restoreForm');
      if (formType === 'signup') {
        const isOpen = signupForm.style.display === 'flex';
        signupForm.style.display = isOpen? 'none' : 'flex';
        restoreForm.style.display = 'none';
      }
      if (formType === 'restore') {
        const isOpen = restoreForm.style.display === 'flex';
        restoreForm.style.display = isOpen? 'none' : 'flex';
        signupForm.style.display = 'none';
      }
    }

    function openModal(modalId) {
      closeModal();
      document.getElementById('modalOverlay').classList.add('active');
      document.getElementById(modalId).classList.add('active');
      activeModal = modalId;
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
      activeModal = null;
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    function showBannedScreen() {
      document.body.innerHTML = `
        <div style="height:100dvh; display:flex; align-items:center; justify-content:center; background:#111b21; flex-direction:column; gap:20px;">
          <h2 style="color:#e9edef">الحساب موقف</h2>
          <div class="toast show" style="position:relative; bottom:auto; left:auto; transform:none; display:block;">
            حسابك موقف من قبل الإدارة
          </div>
        </div>
      `;
    }



    /* ========== Firebase Logic ========== */
    async function generateUniqueNumber() {
      let attempts = 0;
      const maxAttempts = 20;
      while (attempts < maxAttempts) {
        const rand = Math.floor(10000 + Math.random() * 90000);
        const number = '71' + rand;
        const usersSnap = await get(ref(db, 'users'));
        if (!usersSnap.exists()) return number;
        const users = usersSnap.val();
        const exists = Object.values(users).some(u => u.number === number);
        if (!exists) return number;
        attempts++;
      }
      throw new Error("تعذر توليد رقم فريد بعد 20 محاولة");
    }

    async function createAccount(name, password) {
      if (name.length < 3) { showToast("الاسم لازم يكون 3 حروف على الأقل"); return; }
      if (!/^\d{5,}$/.test(password) || /(.)\1{4,}/.test(password) || password === "12345") {
        showToast("كلمة المرور ضعيفة"); return;
      }
      const usersSnap = await get(ref(db, 'users'));
      if (usersSnap.exists()) {
        const users = usersSnap.val();
        if (Object.values(users).some(u => u.name === name)) {
          showToast("الاسم مستخدم مسبقاً"); return;
        }
      }
      const number = await generateUniqueNumber();
      const userId = 'user_' + Date.now();
      
      // التعديل 1: ضفت isAdmin: false مع البيانات اللي بتتخزن
      const userData = {
        name: name, 
        number: number, 
        password: password, 
        createdAt: serverTimestamp(),
        isAdmin: false
      };
      
      await set(ref(db, `users/${userId}`), userData);
      
      // التعديل 2: خليت currentUser ياخذ كل الداتا من userData
      currentUser = { uid: userId, ...userData };
      
      localStorage.setItem('wa_haroon_user', JSON.stringify(currentUser));
      showToast(`تم التسجيل! رقمك هو ${number}`);
      document.getElementById('signupName').value = '';
      document.getElementById('signupPass').value = '';
      document.getElementById('signupForm').style.display = 'none';
      showScreen('chatsScreen');
      document.getElementById('currentUserName').textContent = name;
      document.getElementById('currentUserNumber').textContent = number;
      loadChatsList();
      
      addAdminMenuItems();
    }

    async function restoreAccount(number, password) {
      const usersSnap = await get(ref(db, 'users'));
      if (!usersSnap.exists()) { showToast("الرقم خطأ"); return; }
      const users = usersSnap.val();
      const userEntry = Object.entries(users).find(([uid, u]) => u.number === number);
      if (!userEntry) { showToast("الرقم خطأ"); return; }
      const [uid, userData] = userEntry;
      if (userData.password!== password) { showToast("كلمة المرور خطأ"); return; }
      
      // غيّرت هذا السطر فقط: خليته ينسخ كل الداتا من Firebase
      currentUser = { uid, ...userData };
      
      localStorage.setItem('wa_haroon_user', JSON.stringify(currentUser));
      showToast("تم استعادة حسابك");
      document.getElementById('signupName').value = '';
      document.getElementById('signupPass').value = '';
      document.getElementById('signupForm').style.display = 'none';
      showScreen('chatsScreen');
      document.getElementById('currentUserName').textContent = userData.name;
      document.getElementById('currentUserNumber').textContent = number;
      loadChatsList();
      
      addAdminMenuItems();
    }

    async function sendMessage(text) {
      if (currentUser?.status === "banned") { showToast("حسابك موقف من قبل الإدارة"); return; }
      if (!text.trim() ||!currentChatId ||!currentUser) return;
      const msgRef = push(ref(db, `chats/${currentChatId}/messages`));
      await set(msgRef, { from: currentUser.uid, text: text, time: serverTimestamp(), status: 'sent' });
      await update(ref(db, `userChats/${currentUser.uid}/${currentChatOtherId}`), {
        lastMsg: text, lastMsgTime: serverTimestamp()
      });
      await update(ref(db, `userChats/${currentChatOtherId}/${currentUser.uid}`), {
        lastMsg: text, lastMsgTime: serverTimestamp()
      });
      document.getElementById('messageInput').value = '';
    }

    function listenMessages(chatId, otherId) {
      if (currentUser?.status === "banned") return;
      if (messagesUnsubscribe) messagesUnsubscribe();
      currentChatId = chatId;
      currentChatOtherId = otherId;
      const messagesRef = ref(db, `chats/${chatId}/messages`);
      messagesUnsubscribe = onValue(messagesRef, (snapshot) => {
        const messagesList = document.getElementById('messagesList');
        messagesList.innerHTML = '';
        if (snapshot.exists()) {
          const messages = snapshot.val();
          Object.values(messages).forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = msg.from === currentUser.uid? 'msg-me' : 'msg-other';
            msgDiv.textContent = msg.text;
            messagesList.appendChild(msgDiv);
          });
          messagesList.scrollTop = messagesList.scrollHeight;
        }
      });
    }

    function loadChatsList() {
      if (!currentUser) return;
      if (chatsUnsubscribe) chatsUnsubscribe();
      const chatsRef = ref(db, `userChats/${currentUser.uid}`);
      chatsUnsubscribe = onValue(chatsRef, async (snapshot) => {
        const chatsList = document.getElementById('chatsList');
        chatsList.innerHTML = '';
        if (!snapshot.exists()) return;
        let chatsArr = [];
        const chats = snapshot.val();
        for (const [otherId, chatData] of Object.entries(chats)) {
          const userSnap = await get(ref(db, `users/${otherId}`));
          if (userSnap.exists()) {
            chatsArr.push({
              id: otherId, user: userSnap.val(),
              lastMsg: chatData.lastMsg || '', lastMsgTime: chatData.lastMsgTime || 0
            });
          }
        }
        chatsArr.sort((a, b) => b.lastMsgTime - a.lastMsgTime);
        chatsArr.forEach(chat => {
          const chatDiv = document.createElement('div');
          chatDiv.className = 'chat-item';
          chatDiv.id = 'chat_' + chat.id;
          chatDiv.innerHTML = `
            <div class="avatar">${chat.user.name[0]}</div>
            <div class="chat-info">
              <div class="chat-top">
                <span class="chat-name">${chat.user.name}</span>
                <span class="chat-time">${formatTime(chat.lastMsgTime)}</span>
              </div>
              <div class="chat-bottom">
                <span class="last-msg">${chat.lastMsg}</span>
              </div>
            </div>
          `;
          chatDiv.addEventListener('click', () => {
            const chatId = [currentUser.uid, chat.id].sort().join('_');
            listenMessages(chatId, chat.id);
            showScreen('chatScreen');
            document.getElementById('chatUserName').textContent = chat.user.name;
          });
          chatsList.appendChild(chatDiv);
        });
      });
      // ملاحظة: ما ننادي addAdminMenuItems هنا عشان ما تنادى بدري
    }

    function formatTime(timestamp) {
      if (!timestamp) return '';
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      if (diff < 86400000) {
        return date.toLocaleTimeString('ar', {hour: '2-digit', minute: '2-digit'});
      }
      return date.toLocaleDateString('ar');
    }

    function togglePerf() {
      const btn = document.getElementById('dt-perf-toggle');
      state.recording =!state.recording;
      btn.textContent = state.recording? 'Stop Recording' : 'Start Recording';

      if (state.recording) {
        state.perf = [];
        const start = performance.now();
        perfInterval = setInterval(() => {
          state.perf.push({time: performance.now() - start, fps: getFPS()});
          if (state.perf.length > 100) state.perf.shift();
          updateMetrics();
          renderWaterfall();
        }, 100);
      } else {
        clearInterval(perfInterval);
      }
    }

    function getFPS() {
      const now = performance.now();
      if (!getFPS.last) getFPS.last = now;
      const fps = 1000 / (now - getFPS.last);
      getFPS.last = now;
      return Math.round(fps);
    }

    function updateMetrics() {
      const mem = performance.memory?
        `Used: ${Math.round(performance.memory.usedJSHeapSize/1048576)}MB` : 'N/A';
      document.getElementById('dt-perf-metrics').innerHTML = `
        <div class="dt-kv"><b>FPS:</b>${getFPS()}</div>
        <div class="dt-kv"><b>Memory:</b>${mem}</div>
      `;
    }

    function renderWaterfall() {
      const out = document.getElementById('dt-perf-waterfall');
      const max = Math.max(...state.perf.map(p => p.fps), 1);
      out.innerHTML = state.perf.map(p =>
        `<div class="dt-progress"><div style="width:${(p.fps/max)*100}%"></div></div>`
      ).join('');
    }

    function loadLighthouse() {
      const out = document.getElementById('dt-lighthouse');
      const checks = [
        {name: 'HTTPS', pass: location.protocol === 'https:'},
        {name: 'Viewport Meta', pass:!!document.querySelector('meta[name="viewport"]')},
        {name: 'No Inline JS', pass: document.querySelectorAll('script:not([src])').length < 5},
        {name: 'Images Alt', pass: [...document.images].every(i => i.alt)}
      ];

      const score = Math.round(checks.filter(c => c.pass).length / checks.length * 100);
      out.innerHTML = `<div style="font-size:18px;margin-bottom:12px">Score: ${score}/100</div>` +
        checks.map(c => `<div class="dt-kv"><b>${c.name}:</b>${c.pass? '✓ Pass' : '✗ Fail'}</div>`).join('');
    }

    function loadSecurity() {
      const out = document.getElementById('dt-security');
      const checks = [
        {name: 'CSP', pass:!!document.querySelector('meta[http-equiv="Content-Security-Policy"]')},
        {name: 'HTTPS', pass: location.protocol === 'https:'},
        {name: 'X-Frame-Options', pass: false}
      ];
      out.innerHTML = checks.map(c =>
        `<div class="dt-kv"><b>${c.name}:</b>${c.pass? 'Secure' : 'Missing'}</div>`
      ).join('');
    }

    function loadCoverage() {
      const out = document.getElementById('dt-coverage');
      const scripts = document.scripts.length;
      const styles = document.styleSheets.length;
      out.innerHTML = `
        <div class="dt-kv"><b>Scripts:</b>${scripts}</div>
        <div class="dt-kv"><b>Stylesheets:</b>${styles}</div>
        <div class="dt-kv"><b>Note:</b>Full coverage requires DevTools Protocol. This is basic count.</div>
      `;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatBytes(bytes) {
      if (!bytes) return '';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      // تعديل: شلنا علامة التنصيص الزايدة اللي كانت توقف السكربت
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + sizes[i];
    }

    // Console Capture آمن
    (function captureConsole() {
      const origLog = console.log;
      const origWarn = console.warn;
      const origError = console.error;

      function safeLog(type, args) {
        try {
          const msg = args.map(a => typeof a === 'object'? JSON.stringify(a) : String(a)).join(' ');
          log(type, msg);
        } catch {}
        if (type === 'info') origLog.apply(console, args);
        if (type === 'warn') origWarn.apply(console, args);
        if (type === 'error') origError.apply(console, args);
      }

      console.log = (...args) => safeLog('info', args);
      console.warn = (...args) => safeLog('warn', args);
      console.error = (...args) => safeLog('error', args);

      window.addEventListener('error', e => log('error', `${e.message} at ${e.filename}:${e.lineno}`));
      window.addEventListener('unhandledrejection', e => log('error', `Promise: ${e.reason}`));
      window.devLog = (msg, type='VAR') => log(type.toLowerCase(), msg);
    })();

    log('info', '[DevTools] Full edition loaded - Admin only');
  })();
} // نهاية شرط الادمن

    document.getElementById('btnSavePass').onclick = async () => {
      const oldPass = document.getElementById('oldPass').value;
      const newPass = document.getElementById('newPass').value;
      const confirmPass = document.getElementById('confirmPass').value;

      if (!oldPass || !newPass || !confirmPass) {
        showToast('املأ كل الحقول');
        return;
      }
      if (newPass !== confirmPass) {
        showToast('كلمات المرور غير متطابقة');
        return;
      }
      if (newPass.length < 5 || /(.)\1{4,}/.test(newPass) || newPass === "12345") {
        showToast('كلمة المرور ضعيفة');
        return;
      }

      const userRef = ref(db, `users/${currentUser.uid}`);
      const snap = await get(userRef);
      if (!snap.exists() || snap.val().password !== oldPass) {
        showToast('كلمة المرور القديمة خطأ');
        return;
      }

      await update(userRef, { password: newPass });
      showToast('تم تغيير كلمة المرور بنجاح');
      closeModal();
    };
    document.getElementById('btnSearch').onclick = async () => {
      const number = document.getElementById('searchNumber').value.trim();
      if (!number) { loadChatsList(); return; }
      
      const usersSnap = await get(ref(db, 'users'));
      if (!usersSnap.exists()) { showToast("لا يوجد مستخدم بهذا الرقم"); return; }
      
      const users = usersSnap.val();
      const userEntry = Object.entries(users).find(([uid, u]) => u.number === number);
      if (!userEntry) { showToast("لا يوجد مستخدم بهذا الرقم"); return; }
      
      const [uid, userData] = userEntry;
      if (uid === currentUser.uid) { showToast("هذا انت"); return; }
      
      const chatsList = document.getElementById('chatsList');
      const existingItem = document.getElementById('search_' + uid);
      if (existingItem) {
        existingItem.scrollIntoView({ behavior: 'smooth', block: 'start' });
        existingItem.style.background = 'var(--bg-panel)';
        setTimeout(() => existingItem.style.background = '', 1000);
        document.getElementById('searchNumber').value = '';
        return;
      }
      
      const chatDiv = document.createElement('div');
      chatDiv.className = 'chat-item';
      chatDiv.id = 'search_' + uid;
      chatDiv.style.borderBottom = '2px solid var(--accent-green)';
      chatDiv.innerHTML = `
        <div class="avatar">${userData.name[0]}</div>
        <div class="chat-info">
          <div class="chat-top">
            <span class="chat-name">${userData.name}</span>
            <span class="chat-time">بحث</span>
          </div>
          <div class="chat-bottom">
            <span class="last-msg">اضغط لبدء المحادثة</span>
          </div>
        </div>
      `;
      chatDiv.addEventListener('click', async () => {
        const chatId = [currentUser.uid, uid].sort().join('_');
        await set(ref(db, `userChats/${currentUser.uid}/${uid}`), {
          lastMsg: "", lastMsgTime: serverTimestamp()
        });
        listenMessages(chatId, uid);
        showScreen('chatScreen');
        document.getElementById('chatUserName').textContent = userData.name;
        document.getElementById('searchNumber').value = '';
      });
      
      if (chatsList.firstChild) {
        chatsList.insertBefore(chatDiv, chatsList.firstChild);
      } else {
        chatsList.appendChild(chatDiv);
      }
      document.getElementById('searchNumber').value = '';
    };
