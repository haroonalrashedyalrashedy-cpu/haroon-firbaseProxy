let statusListener = null, typingListener = null, msgListener = null;
let colorTarget = 'chats';
let loadingOld = false;
let isCreatingAccount = false;
let isRestoringAccount = false;

const $ = id => document.getElementById(id);
const showToast = (msg, color='#f15c6d') => {
  const t = $('toast');
  t.textContent = msg;
  t.style.background = color;
  t.className = 'toast';
  setTimeout(() => t.className = 'hidden', 3000);
};
const formatTime = ts => {
  if(!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit'});
};
const formatLastSeen = ts => {
  if(!ts) return 'غير متصل';
  const diff = Date.now() - ts;
  if(diff < 20000) return 'متصل الآن';
  const d = new Date(ts);
  return 'آخر ظهور ' + d.toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit'});
};

  $('signupForm').classList.add('hidden');
  $('loginForm').classList.add('hidden');
  $(type+'Form').classList.remove('hidden');
};

window.toggleMyPass = () => {
  if(!myPassword) myPassword = sessionStorage.getItem('myPass') || '';
  passVisible =!passVisible;
  $('myPass').textContent = passVisible && myPassword? myPassword : '••••••';
};

window.toggleEye = id => {
  const inp = $(id);
  inp.type = inp.type === 'password'? 'text' : 'password';
};

let currentForm = null;
window.toggleForm = (type) => {
  const signupForm = $('signupForm');
  const loginForm = $('loginForm');
  const signupTab = $('signupTab');
  const loginTab = $('loginTab');
  
  if (currentForm === type) {
    signupForm.classList.add('hidden');
    loginForm.classList.add('hidden');
    signupTab.classList.remove('active');
    loginTab.classList.remove('active');
    currentForm = null;
    return;
  }
  
  if (type === 'signup') {
    signupForm.classList.remove('hidden');
    loginForm.classList.add('hidden');
    signupTab.classList.add('active');
    loginTab.classList.remove('active');
    currentForm = 'signup';
  } else {
    loginForm.classList.remove('hidden');
    signupForm.classList.add('hidden');
    loginTab.classList.add('active');
    signupTab.classList.remove('active');
    currentForm = 'login';
  }
};

onAuthStateChanged(auth, async user => {
  console.log('onAuthStateChanged اشتغل، اليوزر:', user? user.uid : 'لا يوجد');

  if(user) {
    if(pendingUserData) {
      console.log('فيه pendingUserData - بأحفظه الحين');
      try {
        await set(ref(db, `users/${user.uid}`), {
          passHash: pendingUserData.passHash,
          email: pendingUserData.email,
          createdAt: serverTimestamp(),
          lastSeen: serverTimestamp()
        });

        await set(ref(db, `publicUsers/${user.uid}`), {
          name: pendingUserData.name,
          uid: pendingUserData.uid
        });

        await set(ref(db, `uids/${pendingUserData.uid}`), user.uid);

        currentUser = {uid: user.uid, name: pendingUserData.name, uidNumber: pendingUserData.uid};
        $('myName').textContent = pendingUserData.name;
        $('myNumber').textContent = pendingUserData.uid;
        myPassword = pendingUserData.passHash || '';
        sessionStorage.setItem('myPass', myPassword);
        $('myPass').textContent = '••••••';
        passVisible = false;
        $('authScreen').classList.add('hidden');
        $('chatsScreen').classList.remove('hidden');
        showToast('تم إنشاء الحساب: رقمك هو '+pendingUserData.uid, '#00a884');
        autoInstallAfterLogin();

        const userRef = ref(db, 'users/'+user.uid);
        onDisconnect(userRef).update({lastSeen: serverTimestamp(), online: false});
        setInterval(() => update(userRef, {lastSeen: serverTimestamp()}), 15000);
        loadChats();

        pendingUserData = null;
        myGeneratedUid = null;
        return;
      } catch(err) {
        console.error('فشل حفظ pendingUserData:', err);
        showToast('فشل إنشاء الحساب');
        await signOut(auth);
        pendingUserData = null;
        myGeneratedUid = null;
        return;
      }
    }

    const pubSnap = await get(ref(db, 'publicUsers/'+user.uid));
    if(pubSnap.exists()){
      const u = pubSnap.val();
      currentUser = {uid: user.uid, name: u.name, uidNumber: u.uid};
      $('myName').textContent = u.name;
      $('myNumber').textContent = u.uid;
      myPassword = sessionStorage.getItem('myPass') || '';
      $('myPass').textContent = '••••••';

      $('authScreen').classList.add('hidden');
      $('chatsScreen').classList.remove('hidden');
      const userRef = ref(db, 'users/'+user.uid);
      onDisconnect(userRef).update({lastSeen: serverTimestamp(), online: false});
      setInterval(() => update(userRef, {lastSeen: serverTimestamp()}), 15000);
      loadChats();

            </div>
            <div style="color:#00a884; font-size:24px">💬</div>
            <span style="color:#8696a0; font-size:22px; padding:0 8px" onclick="event.stopPropagation(); clearSearchResult()">×</span>
          </div>
        `;
        resultDiv.classList.remove('hidden');
      }
      onValue(ref(db, `calls/${auth.currentUser?.uid}`), snap => {
        if(snap.exists()) {
          const call = snap.val();
          if (navigator.vibrate) navigator.vibrate([500,200,500]);
          if($('callScreen')) return;
          const callScreen = document.createElement('div');
          callScreen.id = 'callScreen';
          callScreen.innerHTML = `
            <div style="font-size:20px; color:#8696a0">مكالمة واردة</div>
            <div class="avatar" style="width:120px; height:120px; font-size:50px">${call.fromName[0]}</div>
            <div style="font-size:28px; font-weight:600">${call.fromName}</div>
            <button onclick="endCall()" style="width:70px; height:70px; background:#f15c6d; border-radius:50%; font-size:30px; margin-top:40px; cursor:pointer">✕</button>
          `;
          document.body.appendChild(callScreen);
          window.endCall = async () => {
            $('callScreen')?.remove();
            await remove(ref(db, `calls/${auth.currentUser.uid}`));
          };
        }
      });
      const settingsSnap = await get(ref(db, `users/${user.uid}/settings`));
      if(settingsSnap.exists()) {
        const settings = settingsSnap.val();
        if(settings.bgChats) $('chatsList').style.background = settings.bgChats;
        if(settings.bgChat) $('messagesList').style.background = settings.bgChat;
      }
    } else {
      console.log('اليوزر موجود في Auth بس مو في publicUsers - حساب قديم');
      showToast('الحساب قديم، سجل حساب جديد', '#f15c6d');
      await signOut(auth);
    }
  } else {
    $('authScreen')?.classList.remove('hidden');
    $('chatsScreen')?.classList.add('hidden');
  }
});

const loadChats = () => {
  const chatsRef = query(ref(db, 'userChats/'+currentUser.uid), orderByChild('lastMsgTime'), limitToLast(15));
  onValue(chatsRef, snap => {
    const chats = [];
    snap.forEach(child => { chats.push({uid: child.key,...child.val()}); });
    chats.reverse();
    const list = $('chatsList');
    list.innerHTML = '';
    chats.forEach(chat => {
      get(ref(db, 'publicUsers/'+chat.uid)).then(uSnap => {
        if(!uSnap.exists()) return;
        const u = uSnap.val();
        const div = document.createElement('div');
        div.className = 'chat-item';
        div.onclick = () => openChat({uid: chat.uid, name: u.name});
        const unreadBadge = chat.unreadCount > 0? `<span style="background:#00a884; color:#111b21; border-radius:10px; padding:2px 6px; font-size:12px; font-weight:bold">${chat.unreadCount}</span>` : '';
        div.innerHTML = `
          <div class="avatar">${u.name[0]}</div>
          <div class="chat-info">
            <div class="chat-name">${u.name}<span style="font-size:13px; color:#8696a0; font-weight:400; margin-right:8px">${u.uid}</span></div>
            <div class="chat-last">${chat.lastMsg || 'اضغط للدردشة'}</div>
          </div>
          <div class="chat-meta">
            <div>${chat.lastMsgTime? formatTime(chat.lastMsgTime) : ''}</div>
            <div class="chat-status">${unreadBadge || formatLastSeen(u.lastSeen)}</div>
          </div>
        `;
        list.appendChild(div);
      });
    });
  });
};

window.openChat = async user => {
  currentChat = user;
  $('chatName').textContent = user.name;
  $('chatNumber').textContent = user.uid;
  $('chatAvatar').textContent = user.name[0];
  $('chatScreen').classList.remove('hidden');
  $('chatsScreen').classList.add('hidden');
  $('messagesList').innerHTML = '';
  replyTo = null;
  oldestMsgTime = null;
  await set(ref(db, `userChats/${currentUser.uid}/${currentChat.uid}/unreadCount`), 0);
  updateReplyUI();
  const chatID = getChatID(currentUser.uid, user.uid);
  if (statusListener) off(statusListener);
  statusListener = ref(db, 'users/'+user.uid+'/lastSeen');
  onValue(statusListener, s => { $('chatStatus').textContent = formatLastSeen(s.val()); });
  if (typingListener) off(typingListener);
  typingListener = ref(db, `chats/${chatID}/typing/${user.uid}`);
  onValue(typingListener, s => {
    if(s.val()) {
      $('chatStatus').textContent = `${user.name} يكتب...`;
    } else {
      onValue(ref(db, 'users/'+user.uid+'/lastSeen'), ss => {
        $('chatStatus').textContent = formatLastSeen(ss.val());
      }, {onlyOnce: true});
    }
  });
  if (msgListener) off(msgListener);
  msgListener = query(ref(db, `chats/${chatID}/messages`), limitToLast(20));
  onChildAdded(msgListener, snap => {
    renderMessage(snap.key, snap.val());
    if(snap.val().sender!== currentUser.uid && navigator.vibrate) navigator.vibrate(50);
    if (!oldestMsgTime || snap.val().time < oldestMsgTime) oldestMsgTime = snap.val().time;
  });
  const msgsRef = ref(db, `chats/${chatID}/messages`);
  onChildChanged(msgsRef, snap => {
    const msg = snap.val();
    const msgEl = $('msg_'+snap.key);
    if(msgEl && msg.sender === currentUser.uid) {
      let statusIcon = '';
      if(msg.status === 'sent') statusIcon = '✓';
      else if(msg.status === 'delivered') statusIcon = '✓✓';
      else if(msg.status === 'read') statusIcon = '<span style="color:#53bdeb">✓✓</span>';
      msgEl.querySelector('div > div:last-child').innerHTML = `${msg.edited? '<span style="font-size:10px; color:#8696a0; margin-right:4px">معدلة</span>' : ''}${formatTime(msg.time)} ${statusIcon}`;
    }
  });
  get(msgsRef).then(snap => {
    const updates = {};
    snap.forEach(s => {
      const msg = s.val();
      if(msg.sender!== currentUser.uid && msg.status!== 'read') {
        updates[`chats/${chatID}/messages/${s.key}/status`] = 'read';
      }
    });
    if(Object.keys(updates).length > 0) update(ref(db), updates);
  });
  setTimeout(fixBars, 100);
};

const renderMessage = async (id, msg, insertTop = false) => {
  const isMe = msg.sender === currentUser.uid;
  const chatID = getChatID(currentUser.uid, currentChat?.uid || '');
  if(chatID && currentChat) {
    const deletedSnap = await get(ref(db, `userDeletedMsgs/${currentUser.uid}/${chatID}/${id}`));
    if(deletedSnap.exists()) return;
  }
  if(msg.deleted) {
    const div = document.createElement('div');
    div.className = `msg ${isMe? 'msg-me' : 'msg-other'}`;
    div.id = 'msg_'+id;
    div.style.cssText = `display:flex; margin:6px 0; ${isMe?'justify-content:flex-end':'justify-content:flex-start'}; opacity:0.6;`;
    div.innerHTML = `
      <div style="background:#2a3942; color:#8696a0; padding:8px 12px; border-radius:8px; max-width:75%; font-style:italic">
        🚫 تم حذف هذه الرسالة
      </div>
    `;
    if (insertTop) $('messagesList').insertBefore(div, $('messagesList').firstChild);
    else $('messagesList').appendChild(div);
    if (!insertTop) $('messagesList').scrollTop = $('messagesList').scrollHeight;
    return;
  }
  if(isMe && msg.status === 'sent' && currentChat) {
    update(ref(db, `chats/${getChatID(currentUser.uid, currentChat.uid)}/messages/${id}`), {status: 'delivered'});
  }
  const div = document.createElement('div');
  div.className = `msg ${isMe? 'msg-me' : 'msg-other'}`;
  div.id = 'msg_'+id;
  div.style.cssText = `display:flex; margin:6px 0; ${isMe?'justify-content:flex-end':'justify-content:flex-start'};`;
  let pressTimer, startX = 0, startY = 0, isDragging = false;
  div.ontouchstart = div.onmousedown = (e) => {
    startX = e.touches? e.touches[0].clientX : e.clientX;
    startY = e.touches? e.touches[0].clientY : e.clientY;
    isDragging = false;
    pressTimer = setTimeout(() => {
      if(!isDragging) {
        e.preventDefault();
        showMsgMenu(id, isMe);
        if(navigator.vibrate) navigator.vibrate(50);
      }
    }, 500);
  };
  div.ontouchmove = div.onmousemove = (e) => {
    if(!startX) return;
    const currentX = e.touches? e.touches[0].clientX : e.clientX;
    const currentY = e.touches? e.touches[0].clientY : e.clientY;
    const diffX = currentX - startX;
    const diffY = Math.abs(currentY - startY);
    if(diffX > 30 && diffY < 50) {
      isDragging = true;
      clearTimeout(pressTimer);
      div.style.transform = `translateX(${Math.min(diffX, 60)}px)`;
      div.style.transition = 'none';
    }
  };
  div.ontouchend = div.onmouseup = div.onmouseleave = (e) => {
    clearTimeout(pressTimer);
    const currentX = e.changedTouches? e.changedTouches[0].clientX : e.clientX;
    const diffX = currentX - startX;
    if(isDragging && diffX > 50) {
      replyMessage(id);
      if(navigator.vibrate) navigator.vibrate(30);
    }
    div.style.transform = 'translateX(0)';
    div.style.transition = 'transform 0.2s';
    startX = 0;
    isDragging = false;
  };
  let statusIcon = '';
  let editedTag = msg.edited? '<span style="font-size:10px; color:#8696a0; margin-right:4px">معدلة</span>' : '';
  if(isMe) {
    if(msg.status === 'sent') statusIcon = '✓';
    else if(msg.status === 'delivered') statusIcon = '✓✓';
    else if(msg.status === 'read') statusIcon = '<span style="color:#53bdeb">✓✓</span>';
  }
  let replyHTML = '';
  if(msg.replyTo) {
    replyHTML = `
      <div style="background:#00000030; padding:6px 10px; border-radius:6px; margin-bottom:6px; border-right:3px solid #00a884; font-size:13px">
        <div style="color:#00a884; font-weight:500">${msg.replyTo.name}</div>
        <div style="color:#8696a0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${msg.replyTo.text}</div>
      </div>
    `;
  }
  let contentHTML = '';
  if(msg.type === 'text') contentHTML = msg.text;
  else if(msg.type === 'audio') contentHTML = `<audio controls src="${msg.data}" style="max-width:240px"></audio>`;
  div.innerHTML = `
    <div style="background:${isMe?'#005c4b':'#202c33'}; color:#e9edef; padding:8px 12px; border-radius:8px; max-width:75%; position:relative; box-shadow:0 1px #00000030">
      ${replyHTML}
      <div style="word-wrap:break-word">${contentHTML}</div>
      <div style="text-align:left; font-size:11px; color:#ffffff99; margin-top:4px">
        ${editedTag}${formatTime(msg.time)} ${statusIcon}
      </div>
    </div>
  `;
  if (insertTop) $('messagesList').insertBefore(div, $('messagesList').firstChild);
  else $('messagesList').appendChild(div);
  if (!insertTop) $('messagesList').scrollTop = $('messagesList').scrollHeight;
};

window.sendMessage = async () => {
  const text = $('msgInput').value.trim();
  if(!text ||!currentChat) return;
  $('msgInput').value = '';
  setTyping(false);
  const chatID = getChatID(currentUser.uid, currentChat.uid);
  const newMsgRef = push(ref(db, `chats/${chatID}/messages`));
  const msgData = {
    text, type: 'text', sender: currentUser.uid,
    time: Date.now(),
    status: 'sent'
  };
  if(replyTo) msgData.replyTo = replyTo;
  const updates = {};
  updates[`chats/${chatID}/messages/${newMsgRef.key}`] = msgData;
  updates[`userChats/${currentUser.uid}/${currentChat.uid}/lastMsg`] = text;
  updates[`userChats/${currentUser.uid}/${currentChat.uid}/lastMsgTime`] = Date.now();
  updates[`userChats/${currentChat.uid}/${currentUser.uid}/lastMsg`] = text;
  updates[`userChats/${currentChat.uid}/${currentUser.uid}/lastMsgTime`] = Date.now();
  updates[`userChats/${currentChat.uid}/${currentUser.uid}/unreadCount`] = increment(1);
  await update(ref(db), updates);
  replyTo = null;
  updateReplyUI();
};

$('msgInput').oninput = () => {
  if(!currentChat) return;
  const chatID = getChatID(currentUser.uid, currentChat.uid);
  set(ref(db, `chats/${chatID}/typing/${currentUser.uid}`), true);
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    set(ref(db, `chats/${chatID}/typing/${currentUser.uid}`), false);
  }, 2000);
};

const originalSendBtn = $('sendBtn').onclick;
$('sendBtn').onclick = () => {
  if(currentChat) {
    const chatID = getChatID(currentUser.uid, currentChat.uid);
    set(ref(db, `chats/${chatID}/typing/${currentUser.uid}`), false);
  }
  if(originalSendBtn) originalSendBtn();
};

window.setTyping = val => {
  if(!currentChat) return;
  clearTimeout(typingTimeout);
  const typingRef = ref(db, `chats/${getChatID(currentUser.uid, currentChat.uid)}/typing/${currentUser.uid}`);
  if(val) {
    set(typingRef, true);
    typingTimeout = setTimeout(() => remove(typingRef), 3000);
  } else {
    remove(typingRef);
  }
};

window.showMsgMenu = (id, isMe) => {
  const menu = document.createElement('div');
  menu.id = 'popupMenu';
  menu.style.cssText = `position:fixed; background:#233138; border-radius:8px; z-index:9999; box-shadow:0 2px 15px #000; padding:8px 0; min-width:200px`;
  menu.innerHTML = `
    <div class="menu-item" onclick="replyMessage('${id}'); closeMenu()">رد</div>
    ${isMe?`<div class="menu-item" onclick="editMessage('${id}'); closeMenu()">تعديل</div>`:''}
    <div class="menu-item" onclick="deleteMsg('${id}','me'); closeMenu()">حذف لدي</div>
    ${isMe?`<div class="menu-item" onclick="deleteMsg('${id}','all'); closeMenu()">حذف لدى الجميع</div>`:''}
  `;
  document.body.appendChild(menu);
  const rect = event.target.getBoundingClientRect();
  menu.style.top = rect.top + 30 + 'px';
  menu.style.left = rect.left + 'px';
  setTimeout(() => document.onclick = e => {if(!menu.contains(e.target)) closeMenu()}, 100);
};

window.closeMenu = () => {
  const m = $('popupMenu');
  if(m) m.remove();
  document.onclick = null;
};

window.replyMessage = async id => {
  const snap = await get(ref(db, `chats/${getChatID(currentUser.uid, currentChat.uid)}/messages/${id}`));
  const msg = snap.val();
  replyTo = {id, text: msg.text || '🎤 رسالة صوتية', name: msg.sender === currentUser.uid? 'أنت' : currentChat.name};
  updateReplyUI();
  $('msgInput').focus();
};

const updateReplyUI = () => {
  let bar = $('replyBar');
  if(!replyTo) { if(bar) bar.remove(); return; }
  if(!bar) {
    bar = document.createElement('div');
    bar.id = 'replyBar';
    bar.style.cssText = 'background:#1f2c33; padding:8px 12px; display:flex; align-items:center; gap:10px; border-right:3px solid #00a884';
    $('chatInputBar').before(bar);
  }
  bar.innerHTML = `
    <div style="flex:1">
      <div style="color:#00a884; font-size:13px">ترد على ${replyTo.name}</div>
      <div style="color:#8696a0; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${replyTo.text}</div>
    </div>
    <span style="font-size:20px; cursor:pointer" onclick="replyTo=null; updateReplyUI()">×</span>
  `;
};

window.deleteMsg = async (id, type) => {
  const chatID = getChatID(currentUser.uid, currentChat.uid);
  if(type === 'all') {
    await update(ref(db, `chats/${chatID}/messages/${id}`), {
      text: 'تم حذف هذه الرسالة', type: 'deleted', deleted: true,
      deletedBy: currentUser.uid, deletedAt: Date.now()
    });
  } else {
    await set(ref(db, `userDeletedMsgs/${currentUser.uid}/${chatID}/${id}`), true);
    $('msg_'+id).remove();
  }
  closeMenu();
};

window.editMessage = async (id) => {
  const snap = await get(ref(db, `chats/${getChatID(currentUser.uid, currentChat.uid)}/messages/${id}`));
  const msg = snap.val();
  if(msg.type!== 'text') return showToast('ما تقدر تعدل إلا الرسائل النصية');
  const newText = prompt('عدل رسالتك:', msg.text);
  if(newText === null || newText.trim() === '' || newText === msg.text) return;
  await update(ref(db, `chats/${getChatID(currentUser.uid, currentChat.uid)}/messages/${id}`), {
    text: newText.trim(), edited: true, editedAt: Date.now()
  });
  showToast('تم التعديل', '#00a884');
};

window.startRecord = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.start();
    showToast('جاري التسجيل... ارفع إصبعك للإرسال', '#00a884');
        $('micBtn').style.color = '#f15c6d';
  } catch(e) {
    showToast('فشل تشغيل المايك');
  }
};

window.stopRecord = async () => {
  if(!mediaRecorder || mediaRecorder.state === 'inactive') return;
  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, {type:'audio/webm'});
    const reader = new FileReader();
    reader.readAsDataURL(blob);
    reader.onloadend = async () => {
      const base64data = reader.result;
      const chatID = getChatID(currentUser.uid, currentChat.uid);
      const newMsgRef = push(ref(db, `chats/${chatID}/messages`));
      const updates = {};
      updates[`chats/${chatID}/messages/${newMsgRef.key}`] = {
        type:'audio', data:base64data, sender:currentUser.uid, time:Date.now(), status:'sent'
      };
      updates[`userChats/${currentUser.uid}/${currentChat.uid}/lastMsg`] = '🎤 رسالة صوتية';
      updates[`userChats/${currentUser.uid}/${currentChat.uid}/lastMsgTime`] = Date.now();
      updates[`userChats/${currentChat.uid}/${currentUser.uid}/lastMsg`] = '🎤 رسالة صوتية';
      updates[`userChats/${currentChat.uid}/${currentUser.uid}/lastMsgTime`] = Date.now();
      updates[`userChats/${currentChat.uid}/${currentUser.uid}/unreadCount`] = increment(1);
      await update(ref(db), updates);
    };
    mediaRecorder.stream.getTracks().forEach(track => track.stop());
  };
  mediaRecorder.stop();
  $('micBtn').style.color = '#aebac1';
  showToast('تم الإرسال', '#00a884');
};

window.toggleEmojiPanel = () => {
  emojiPanelOpen = !emojiPanelOpen;
  const panel = $('emojiPanel');
  const inputBar = $('chatInputBar');
  const emojiIcon = $('emojiIcon');
  const keyboardIcon = $('keyboardIcon');
  
  if(emojiPanelOpen) {
    if(panel.innerHTML === '') loadEmojis();
    panel.classList.remove('hidden');
    inputBar.classList.add('emoji-open');
    emojiIcon.classList.add('hidden');
    keyboardIcon.classList.remove('hidden');
    $('msgInput').blur();
  } else {
    closeEmojiPanel();
  }
};

const closeEmojiPanel = () => {
  emojiPanelOpen = false;
  $('emojiPanel').classList.add('hidden');
  $('chatInputBar').classList.remove('emoji-open');
  $('emojiIcon').classList.remove('hidden');
  $('keyboardIcon').classList.add('hidden');
};

const loadEmojis = () => {
  const emojis = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕','🤑','🤠'];
  const panel = $('emojiPanel');
  panel.innerHTML = '';
  emojis.forEach(e => {
    const span = document.createElement('span');
    span.textContent = e;
    span.style.cssText = 'font-size:28px; cursor:pointer; text-align:center; padding:8px';
    span.onclick = () => insertEmoji(e);
    panel.appendChild(span);
  });
};

const insertEmoji = emoji => {
  const input = $('msgInput');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  input.value = input.value.substring(0, start) + emoji + input.value.substring(end);
  input.selectionStart = input.selectionEnd = start + emoji.length;
  input.focus();
};

window.showMenu = type => {
  const menu = document.createElement('div');
  menu.id = 'popupMenu';
  menu.style.cssText = `position:fixed; top:60px; right:10px; background:#233138; border-radius:8px; z-index:9999; box-shadow:0 2px 15px #000; padding:8px 0; min-width:180px`;
  
  if(type === 'mainMenu') {
    menu.innerHTML = `
      <div class="menu-item" onclick="changePass()">تغيير كلمة السر</div>
      <div class="menu-item" onclick="showColorPicker('chats')">تغيير لون قائمة المحادثات</div>
      <div class="menu-item" onclick="logout()">تسجيل الخروج</div>
    `;
  } else {
    menu.innerHTML = `
      <div class="menu-item" onclick="showColorPicker('chat')">تغيير خلفية الدردشة</div>
      <div class="menu-item" onclick="callUser()">اتصال</div>
    `;
  }
  
  document.body.appendChild(menu);
  setTimeout(() => document.onclick = e => {
    if(!menu.contains(e.target)) closeMenu();
  }, 100);
};

window.showColorPicker = target => {
  colorTarget = target;
  $('colorPanel').classList.remove('hidden');
  setTimeout(() => {
    document.onclick = e => {
      if(!$('colorPanel').contains(e.target) && !e.target.closest('.menu-item')) {
        $('colorPanel').classList.add('hidden');
        document.onclick = null;
      }
    }
  }, 100);
};

document.querySelectorAll('.color-option').forEach(opt => {
  opt.onclick = async () => {
    const color = opt.dataset.color;
    if(colorTarget === 'chats') {
      $('chatsList').style.background = color;
      if(currentUser) {
        await update(ref(db, `users/${currentUser.uid}/settings`), {bgChats: color});
      }
    } else {
      $('messagesList').style.background = color;
      if(currentUser) {
        await update(ref(db, `users/${currentUser.uid}/settings`), {bgChat: color});
      }
    }
    $('colorPanel').classList.add('hidden');
    showToast('تم تغيير اللون', '#00a884');
  }
});

window.changePass = async () => {
  closeMenu();
  const newPass = prompt('اكتب كلمة السر الجديدة 6 أرقام على الأقل:');
  if(!newPass) return;
  if(!/^\d+$/.test(newPass) || newPass.length < 6) {
    showToast('كلمة السر لازم 6 أرقام على الأقل');
    return;
  }
  try {
    await updatePassword(auth.currentUser, newPass);
    await update(ref(db, `users/${currentUser.uid}`), {passHash: newPass});
    myPassword = newPass;
    sessionStorage.setItem('myPass', newPass);
    showToast('تم تغيير كلمة السر', '#00a884');
  } catch(e) {
    showToast('فشل تغيير كلمة السر: '+e.message);
  }
};

window.callUser = async () => {
  if(!currentChat) return;
  closeMenu();
  await set(ref(db, `calls/${currentChat.uid}`), {
    from: currentUser.uid,
    fromName: currentUser.name,
    time: Date.now()
  });
  showToast('جاري الاتصال بـ '+currentChat.name, '#00a884');
};

window.logout = async () => {
  closeMenu();
  await signOut(auth);
  sessionStorage.removeItem('myPass');
  localStorage.removeItem('lastSearchResult');
  currentUser = null;
  currentChat = null;
  showToast('تم تسجيل الخروج');
};

const fixBars = () => {
  const h = window.innerHeight;
  $('messagesList').style.height = (h - 120) + 'px';
};

window.addEventListener('resize', fixBars);
window.addEventListener('load', fixBars);
window.addEventListener('popstate', e => {
  if(!$('chatScreen').classList.contains('hidden')) {
    backToChats();
  }
});

const autoInstallAfterLogin = () => {
  if(localStorage.getItem('appInstalled') === 'true') return;
  setTimeout(() => {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const isAndroid = /Android/.test(navigator.userAgent);
    if(isIOS) {
      showToast('للتثبيت: اضغط مشاركة ثم "إضافة إلى الشاشة الرئيسية"', '#00a884');
    } else if(isAndroid) {
      showToast('للتثبيت: اضغط القائمة ثم "تثبيت التطبيق"', '#00a884');
    }
    localStorage.setItem('appInstalled', 'true');
  }, 2000);
};


</script>
</body>
</html>
